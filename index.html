<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>inhouse learn</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --surface-hover: #fafaf8;
      --border: rgba(0,0,0,0.06);
      --border-strong: rgba(0,0,0,0.1);
      --text: #1a1a1a;
      --text-secondary: #555;
      --muted: #999;
      --orange: #E07A3C;
      --orange-soft: rgba(224,122,60,0.07);
      --orange-border: rgba(224,122,60,0.13);
      --orange-glow: rgba(224,122,60,0.18);
      --green: #22c55e;
      --topbar-h: 54px;
      --sidebar-w: 260px;
      --r-xs: 6px;
      --r-sm: 10px;
      --r-md: 14px;
      --r-lg: 18px;
      --r-xl: 28px;
      --r-full: 999px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.1);
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body { height: 100%; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    button, input, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; background: none; color: inherit; }
    .hidden { display: none !important; }

    /* ─── TOPBAR ─────────────────────────────────────── */
    .topbar {
      position: fixed; inset: 0 0 auto 0; z-index: 100;
      height: var(--topbar-h);
      display: flex; align-items: center; gap: 10px;
      padding: 0 18px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .topbar-start { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .hamburger {
      display: none; width: 36px; height: 36px; border-radius: var(--r-sm);
      align-items: center; justify-content: center; color: var(--muted);
      transition: background 0.18s var(--ease), color 0.18s var(--ease);
    }
    .hamburger:hover { background: rgba(0,0,0,0.05); color: var(--text); }
    .brand {
      font-family: 'Comfortaa', cursive; font-size: 0.95rem; font-weight: 700;
      display: flex; align-items: center; gap: 7px; white-space: nowrap;
      color: var(--text);
    }
    .brand svg { transition: transform 0.3s var(--ease); }
    .brand:hover svg { transform: translateY(-1px); }
    .topbar-mid {
      flex: 1; min-width: 0; display: flex; align-items: center; gap: 8px;
    }
    .transport-pill {
      display: none;
    }
    .transport-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
    }
    .sel-wrap { position: relative; display: flex; align-items: center; flex-shrink: 0; }
    .sel-wrap:has(select.hidden) { display: none; }
    .sel-wrap::after {
      content: '';
      position: absolute; right: 8px;
      width: 12px; height: 12px; pointer-events: none;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%23999' stroke-width='2.5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E") no-repeat center / contain;
    }
    .topbar-select {
      -webkit-appearance: none; appearance: none;
      border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 5px 24px 5px 10px;
      background: var(--surface);
      font-size: 0.76rem; font-weight: 600; color: var(--text);
      cursor: pointer; outline: none;
      transition: border-color 0.18s var(--ease), box-shadow 0.18s var(--ease);
    }
    .topbar-select:hover { border-color: var(--border-strong); }
    .topbar-select:focus { border-color: var(--orange); box-shadow: 0 0 0 2px var(--orange-soft); }
    .topbar-end { display: flex; align-items: center; gap: 6px; flex-shrink: 0; margin-left: auto; }

    /* ─── BUTTONS ────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 0 14px; height: 34px; border: none; border-radius: var(--r-sm);
      font-size: 0.8rem; font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: all 0.18s var(--ease);
    }
    .btn-primary { background: var(--text); color: #fff; }
    .btn-primary:hover { background: #333; transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .btn-secondary { background: rgba(0,0,0,0.05); color: var(--text); }
    .btn-secondary:hover { background: rgba(0,0,0,0.08); }
    .btn-outline {
      background: transparent; color: var(--text); border: 1px solid var(--border);
    }
    .btn-outline:hover { border-color: var(--border-strong); background: var(--surface-hover); }
    .btn-icon {
      width: 34px; height: 34px; padding: 0; border-radius: var(--r-sm);
      background: transparent; color: var(--muted);
    }
    .btn-icon:hover { background: rgba(0,0,0,0.05); color: var(--text); }
    .profile-btn {
      width: 32px; height: 32px; border-radius: 50%;
      overflow: hidden; background: rgba(0,0,0,0.06); border: 2px solid transparent;
      flex-shrink: 0; cursor: pointer; padding: 0;
      transition: border-color 0.18s var(--ease), transform 0.18s var(--ease);
    }
    .profile-btn:hover { border-color: var(--orange-border); transform: scale(1.05); }
    .profile-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ─── LAYOUT ─────────────────────────────────────── */
    #app-container { height: 100vh; padding-top: var(--topbar-h); display: flex; flex-direction: column; }
    .layout { flex: 1; min-height: 0; display: grid; grid-template-columns: var(--sidebar-w) 1fr; }

    /* ─── SIDEBAR ────────────────────────────────────── */
    .sidebar-overlay {
      display: none; position: fixed; inset: var(--topbar-h) 0 0 0;
      background: rgba(0,0,0,0.3); backdrop-filter: blur(2px);
      z-index: 50; transition: opacity 0.25s var(--ease);
    }
    .sidebar {
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden; min-height: 0;
    }
    .sidebar-body {
      flex: 1; min-height: 0; display: flex; flex-direction: column;
      padding: 14px 10px; gap: 8px; overflow: hidden;
    }
    .sidebar-label {
      font-size: 0.64rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--muted); padding: 2px 6px; flex-shrink: 0;
    }
    .chat-list {
      flex: 1; min-height: 0; overflow-y: auto;
      display: flex; flex-direction: column; gap: 1px;
    }
    .chat-list::-webkit-scrollbar { width: 3px; }
    .chat-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: var(--r-full); }
    .chat-row {
      display: flex; align-items: center;
      border-radius: var(--r-sm);
      transition: background 0.15s var(--ease);
    }
    .chat-row:hover { background: rgba(0,0,0,0.03); }

    .chat-item {
      flex: 1; min-width: 0; text-align: left; border-radius: var(--r-sm); padding: 9px 10px;
      display: flex; flex-direction: column; gap: 2px;
      cursor: pointer; border: none; width: 100%;
      background: transparent;
      transition: none;
    }
    .chat-item.active { background: var(--orange-soft); }
    .chat-row:has(.chat-item.active) { background: var(--orange-soft); }
    .chat-item-title { font-size: 0.81rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
    .chat-item-meta { font-size: 0.67rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-delete {
      width: 28px; height: 28px; border-radius: var(--r-xs);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); flex-shrink: 0; margin-right: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .chat-delete:hover { background: rgba(0,0,0,0.06); color: var(--text); }
    .chat-delete svg { width: 13px; height: 13px; }
    .sidebar-profile {
      border-top: 1px solid var(--border); padding: 12px 14px;
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .sidebar-profile.hidden { display: none !important; }
    .sidebar-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .sidebar-profile-info { min-width: 0; }
    .sidebar-profile-name { font-size: 0.8rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-profile-email { font-size: 0.67rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ─── CHAT ───────────────────────────────────────── */
    .chat { display: grid; grid-template-rows: 1fr auto; min-height: 0; background: var(--bg); }
    .thread-wrap {
      overflow-y: auto; padding: 24px 20px;
      display: flex; justify-content: center;
    }
    .thread-wrap::-webkit-scrollbar { width: 4px; }
    .thread-wrap::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: var(--r-full); }
    .thread { width: min(700px, 100%); display: flex; flex-direction: column; gap: 6px; }

    /* ─── HERO ───────────────────────────────────────── */
    .hero {
      padding: 60px 0 40px; display: flex; flex-direction: column;
      align-items: center; text-align: center; gap: 16px;
      animation: fadeIn 0.5s var(--ease) both;
    }
    .hero-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, var(--orange-soft), var(--orange-glow));
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px;
    }
    .hero h2 {
      font-family: 'Comfortaa', cursive;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700; letter-spacing: -0.02em; line-height: 1.2;
      max-width: 20ch; color: var(--text);
    }
    .hero-sub {
      font-size: 0.88rem; color: var(--muted); max-width: 36ch; line-height: 1.5;
    }
    .chips {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      max-width: 480px; width: 100%; margin-top: 8px;
    }
    .chip {
      padding: 12px 14px; border-radius: var(--r-md);
      background: var(--surface); border: 1px solid var(--border);
      font-size: 0.79rem; font-weight: 500; cursor: pointer; text-align: left;
      color: var(--text-secondary); line-height: 1.4;
      transition: all 0.2s var(--ease);
      box-shadow: var(--shadow-sm);
    }
    .chip:hover {
      border-color: var(--orange-border); box-shadow: var(--shadow);
      transform: translateY(-1px); color: var(--text);
    }

    /* ─── MESSAGES ───────────────────────────────────── */
    .message {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 4px 0; max-width: 84%;
      animation: fadeSlideUp 0.3s var(--ease) both;
    }
    .message.user-msg {
      align-self: flex-end; flex-direction: row-reverse; max-width: 74%;
    }
    .message-badge {
      width: 26px; height: 26px; border-radius: 50%; overflow: hidden;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 0.58rem; font-weight: 700;
      background: rgba(0,0,0,0.04); color: var(--muted); margin-top: 2px;
    }
    .message-badge img { width: 100%; height: 100%; object-fit: cover; }
    .message-badge svg { width: 15px; height: 9px; }
    .message-badge.user { background: var(--orange-soft); color: var(--orange); }
    .message-badge.assistant { background: rgba(0,0,0,0.04); }
    .message-body { min-width: 0; display: flex; flex-direction: column; }
    .message-meta {
      font-size: 0.64rem; font-weight: 500;
      color: var(--muted); margin-bottom: 3px;
      opacity: 0; transition: opacity 0.2s var(--ease);
      user-select: none;
    }
    .message:hover .message-meta { opacity: 1; }
    .message.user-msg .message-meta { text-align: right; }
    .bubble {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px var(--r-lg) var(--r-lg) var(--r-lg);
      padding: 12px 16px;
      line-height: 1.65; font-size: 0.9rem; overflow-wrap: anywhere;
      box-shadow: var(--shadow-sm);
    }
    .message.user-msg .bubble {
      background: var(--orange-soft); border-color: var(--orange-border);
      border-radius: var(--r-lg) 4px var(--r-lg) var(--r-lg);
    }
    .bubble h1, .bubble h2, .bubble h3 { margin: 0 0 8px; line-height: 1.2; }
    .bubble h1 { font-size: 1.2em; }
    .bubble h2 { font-size: 1.1em; }
    .bubble h3 { font-size: 1em; }
    .bubble p + p, .bubble ul + p, .bubble ol + p, .bubble pre + p { margin-top: 8px; }
    .bubble ul, .bubble ol { margin: 8px 0 0 18px; }
    .bubble li + li { margin-top: 4px; }
    .bubble strong { font-weight: 700; }
    .bubble em { font-style: italic; }
    .bubble blockquote { margin: 8px 0 0; padding-left: 12px; border-left: 3px solid var(--orange-border); color: var(--text-secondary); font-style: italic; }
    .bubble pre { margin-top: 8px; padding: 14px; border-radius: var(--r-sm); background: #1c1c1e; color: #f4f0e8; overflow-x: auto; font-size: 0.82rem; line-height: 1.55; }
    .bubble code { font-family: ui-monospace, 'SF Mono', SFMono-Regular, Consolas, monospace; }
    .bubble :not(pre) > code { padding: 2px 6px; border-radius: var(--r-xs); background: rgba(0,0,0,0.05); font-size: 0.87em; }
    .bubble .katex-display { margin: 10px 0; overflow-x: auto; overflow-y: hidden; }
    .bubble table { border-collapse: collapse; margin-top: 8px; font-size: 0.84rem; width: 100%; }
    .bubble th, .bubble td { border: 1px solid var(--border); padding: 6px 10px; }
    .bubble th { background: rgba(0,0,0,0.025); font-weight: 600; text-align: left; }
    .attachment-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .attachment-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: var(--r-full);
      background: rgba(0,0,0,0.035); border: 1px solid var(--border);
      font-size: 0.73rem; max-width: 200px;
      transition: background 0.15s;
    }
    .attachment-pill:hover { background: rgba(0,0,0,0.06); }
    .attachment-pill svg { width: 12px; height: 12px; flex-shrink: 0; }
    .attachment-pill-text { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

    /* ─── TYPING ─────────────────────────────────────── */
    .typing { display: inline-flex; align-items: center; gap: 5px; padding: 2px 0; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); opacity: 0.4; animation: blink 1.1s ease-in-out infinite; }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes blink {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.25; }
      40% { transform: translateY(-4px); opacity: 1; }
    }

    /* ─── COMPOSER ───────────────────────────────────── */
    .composer-area {
      padding: 10px 20px 18px; background: var(--bg);
      border-top: none;
    }
    .composer-shell {
      max-width: 700px; margin: 0 auto;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-xl); padding: 6px 7px 6px 4px;
      box-shadow: var(--shadow);
      transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }
    .composer-shell:focus-within {
      border-color: var(--orange-border);
      box-shadow: 0 0 0 3px var(--orange-soft), var(--shadow);
    }
    .composer-attachments {
      display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 8px 6px;
    }
    .composer-attachment {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: var(--r-full);
      background: var(--orange-soft); border: 1px solid var(--orange-border);
      font-size: 0.73rem; color: var(--text);
    }
    .composer-attachment svg { width: 12px; height: 12px; flex-shrink: 0; }
    .composer-attachment-name { max-width: 180px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .composer-attachment button {
      width: 16px; height: 16px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 0.65rem; color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }
    .composer-attachment button:hover { background: rgba(0,0,0,0.08); color: var(--text); }
    .composer-row { display: flex; align-items: flex-end; gap: 4px; }
    .attach-btn {
      width: 36px; height: 36px; flex-shrink: 0; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      transition: background 0.18s var(--ease), color 0.18s var(--ease), transform 0.18s var(--ease);
    }
    .attach-btn:hover { background: rgba(0,0,0,0.05); color: var(--text); transform: scale(1.05); }
    .attach-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .composer {
      flex: 1; min-height: 36px; max-height: 200px; padding: 8px 6px;
      resize: none; border: 0; outline: none; background: transparent;
      line-height: 1.5; color: var(--text); font-size: 0.9rem;
    }
    .composer::placeholder { color: var(--muted); }
    .send-btn {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--orange); color: #fff;
      transition: opacity 0.18s var(--ease), transform 0.18s var(--ease), background 0.18s var(--ease);
    }
    .send-btn:hover:not([disabled]) { transform: scale(1.06); background: #d06a30; }
    .send-btn[disabled] { opacity: 0.2; cursor: not-allowed; background: var(--muted); }
    .composer-status-row { padding: 4px 8px 0; }
    #composer-status { font-size: 0.7rem; color: var(--muted); }

    /* ─── TOAST ──────────────────────────────────────── */
    .toast-wrap { position: fixed; right: 14px; bottom: 14px; display: flex; flex-direction: column; gap: 8px; z-index: 300; }
    .toast {
      min-width: 220px; max-width: 320px; padding: 12px 16px;
      border-radius: var(--r-md); background: #1c1c1e; color: #fff;
      box-shadow: var(--shadow-lg); line-height: 1.4; font-size: 0.83rem;
      animation: fadeSlideUp 0.3s var(--ease) both;
    }
    .toast strong { display: block; margin-bottom: 2px; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; opacity: 0.7; }

    /* ─── ANIMATIONS ────────────────────────────────── */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ─── MOBILE ─────────────────────────────────────── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 0px; --topbar-h: 50px; }
      .hamburger { display: flex; }
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed; inset: var(--topbar-h) auto 0 0; width: 280px; z-index: 60;
        transform: translateX(-100%);
        transition: transform 0.28s var(--ease);
        box-shadow: var(--shadow-lg);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; cursor: pointer; }
      .transport-pill { display: none; }
      .thread-wrap { padding: 16px 12px; }
      .composer-area { padding: 8px 10px 14px; }
      .message, .message.user-msg { max-width: 92%; }
      .message-badge { width: 22px; height: 22px; }
      .message-badge svg { width: 12px; height: 7px; }
      .message { gap: 7px; }
      .hero { padding: 40px 0 28px; }
      .hero h2 { font-size: 1.3rem; }
      .chips { grid-template-columns: 1fr; max-width: 100%; }
      .chip { padding: 11px 13px; }
      .chat-delete { opacity: 1; }
    }
    @media (max-width: 480px) {
      .topbar { padding: 0 10px; gap: 6px; }
      .brand { font-size: 0.85rem; }
      .brand svg { width: 22px; height: 13px; }
      .sel-wrap { display: none; }
      .btn-primary .btn-label { display: none; }
      .thread-wrap { padding: 12px 8px; }
      .bubble { padding: 10px 13px; font-size: 0.87rem; }
      .composer { font-size: 0.87rem; }
      .message-badge { display: none; }
      .message, .message.user-msg { gap: 0; max-width: 96%; }
      .hero { padding: 32px 0 20px; gap: 12px; }
      .hero-icon { width: 44px; height: 44px; }
    }

    /* ─── MSG ACTIONS ────────────────────────────────── */
    .msg-actions {
      display: flex; align-items: center; gap: 2px;
      padding: 3px 0 0; opacity: 0;
      transition: opacity 0.15s var(--ease);
    }
    .message:hover .msg-actions,
    .message .msg-actions:focus-within { opacity: 1; }
    .msg-action-btn {
      width: 28px; height: 28px; border-radius: var(--r-xs);
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--muted); background: none; border: none; cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }
    .msg-action-btn:hover { background: rgba(0,0,0,0.05); color: var(--text); }
    .msg-action-btn svg { width: 14px; height: 14px; }
    .msg-nav {

    };

    function uid(prefix) {
      return prefix + '-' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatWhen(value) {
      try {
        return new Intl.DateTimeFormat('es-ES', {
          dateStyle: 'short',
          timeStyle: 'short'
        }).format(new Date(value));
      } catch (error) {
        return value;
      }
    }

    function isConfigured(value) {
      return !!value && !String(value).includes('YOUR_') && !String(value).includes('PASTE_');
    }

    function inferredGoogleProject() {
      const match = String(APP_CONFIG.GOOGLE_CLIENT_ID || '').match(/^(\d+)-/);
      return match ? match[1] : '';
    }

    function googleProjectRef() {
      if (isConfigured(APP_CONFIG.GOOGLE_CLOUD_PROJECT)) {
        return String(APP_CONFIG.GOOGLE_CLOUD_PROJECT).trim();
      }
      return inferredGoogleProject();
    }

    function hasOauthConfig() {
      return isConfigured(APP_CONFIG.GOOGLE_CLIENT_ID) && !!googleProjectRef();
    }

    function getModelOption(modelId) {
      return MODEL_OPTIONS.find((option) => option.id === modelId) || MODEL_OPTIONS.find((option) => option.id === APP_CONFIG.GEMINI_MODEL) || MODEL_OPTIONS[0];
    }

    function normalizeModelId(modelId) {
      return getModelOption(modelId).id;
    }

    function defaultThinkingLevelForModel(modelId) {
      return getModelOption(modelId).defaultThinkingLevel || '';
    }

    function normalizeThinkingLevelForModel(modelId, thinkingLevel) {
      const option = getModelOption(modelId);
      const allowedLevels = option.thinkingLevels || [];
      if (!allowedLevels.length) {
        return '';
      }
      const rawLevel = String(thinkingLevel || '').trim().toLowerCase();
      if (allowedLevels.includes(rawLevel)) {
        return rawLevel;
      }
      return defaultThinkingLevelForModel(option.id);
    }

    function normalizeChatConfig(chat) {
      if (!chat || typeof chat !== 'object') {
        return chat;
      }
      chat.model = normalizeModelId(chat.model || APP_CONFIG.GEMINI_MODEL);
      chat.thinkingLevel = normalizeThinkingLevelForModel(chat.model, chat.thinkingLevel || APP_CONFIG.GEMINI_THINKING_LEVEL);
      return chat;
    }

    function normalizeStoredMessage(message) {
      const content = message && typeof message.content === 'string'
        ? message.content
        : '';
      const attachments = Array.isArray(message && message.attachments)
        ? message.attachments.map((item) => serializeAttachmentForStorage(item)).filter(Boolean)
        : [];
      const parts = Array.isArray(message && message.parts)
        ? message.parts.map((part) => serializePartForStorage(part, attachments)).filter(Boolean)
        : (content ? [{ text: content }] : []);
      return {
        id: message && typeof message.id === 'string' ? message.id : uid('msg'),
        role: message && message.role === 'assistant' ? 'assistant' : 'user',
        content,
        parts,
        attachments,
        alternatives: Array.isArray(message && message.alternatives) ? message.alternatives : [],
        activeAlternative: Number(message && message.activeAlternative) || 0,
        pending: !!(message && message.pending),
        createdAt: message && typeof message.createdAt === 'string' ? message.createdAt : nowIso()
      };
    }

    function normalizeStoredChat(chat) {
      const createdAt = chat && typeof chat.createdAt === 'string'
        ? chat.createdAt
        : nowIso();
      return normalizeChatConfig({
        id: chat && typeof chat.id === 'string' ? chat.id : uid('chat'),
        title: chat && typeof chat.title === 'string' && chat.title.trim() ? chat.title : 'Nuevo chat',
        customTitle: chat && typeof chat.customTitle === 'string' ? chat.customTitle : null,
        pinned: !!(chat && chat.pinned),
        createdAt,
        updatedAt: chat && typeof chat.updatedAt === 'string' ? chat.updatedAt : createdAt,
        messages: Array.isArray(chat && chat.messages)
          ? chat.messages.map((message) => normalizeStoredMessage(message))
          : [],
        model: chat && chat.model ? chat.model : APP_CONFIG.GEMINI_MODEL,
        thinkingLevel: chat && typeof chat.thinkingLevel !== 'undefined'
          ? chat.thinkingLevel
          : APP_CONFIG.GEMINI_THINKING_LEVEL
      });
    }

    function normalizeSnapshot(snapshot) {
      if (!snapshot || !Array.isArray(snapshot.chats) || !snapshot.chats.length) {
        return null;
      }
      const chats = snapshot.chats.map((chat) => normalizeStoredChat(chat));
      return {
        version: typeof snapshot.version === 'number' ? snapshot.version : 1,
        savedAt: typeof snapshot.savedAt === 'string' ? snapshot.savedAt : nowIso(),
        activeChatId: typeof snapshot.activeChatId === 'string' ? snapshot.activeChatId : chats[0].id,
        chats
      };
    }

    function buildStateSnapshot() {
      return {
        version: 1,
        savedAt: nowIso(),
        activeChatId: appState.activeChatId,
        chats: appState.chats.map((chat) => {
          const normalizedChat = normalizeStoredChat(chat);
          normalizedChat.messages = normalizedChat.messages.filter((message) => !message.pending);
          return normalizedChat;
        })
      };
    }

    function applySnapshotToState(snapshot) {
      const normalized = normalizeSnapshot(snapshot);
      if (!normalized) {
        return false;
      }
      appState.chats = normalized.chats;
      appState.activeChatId = normalized.activeChatId;
      ensureActiveChat();
      saveState({
        skipDrive: true
      });
      return true;
    }

    function messageHasVisibleContent(message) {
      if (!message || message.pending) {
        return false;
      }
      if (typeof message.content === 'string' && message.content.trim()) {
        return true;
      }
      return Array.isArray(message.parts) && message.parts.some((part) => {
        return part && typeof part.text === 'string' && part.text.trim() && !part.thought;
      });
    }

    function chatHasMeaningfulContent(chat) {
      return !!(chat && Array.isArray(chat.messages) && chat.messages.some((message) => messageHasVisibleContent(message)));
    }

    function snapshotHasMeaningfulContent(snapshot) {
      return !!(snapshot && Array.isArray(snapshot.chats) && snapshot.chats.some((chat) => chatHasMeaningfulContent(chat)));
    }

    function parseSnapshotMoment(value) {
      const timestamp = Date.parse(value || '');
      return Number.isFinite(timestamp) ? timestamp : 0;
    }

    function snapshotFreshness(snapshot) {
      if (!snapshot || !Array.isArray(snapshot.chats)) {
        return 0;
      }
      let newest = 0;
      snapshot.chats.forEach((chat) => {
        if (!chatHasMeaningfulContent(chat)) {
          return;
        }
        newest = Math.max(newest, parseSnapshotMoment(chat.updatedAt), parseSnapshotMoment(chat.createdAt));
        (chat.messages || []).forEach((message) => {
          newest = Math.max(newest, parseSnapshotMoment(message.createdAt));
        });
      });
      return newest;
    }

    function resetDriveState() {
      if (appState.driveSyncTimer) {
        window.clearTimeout(appState.driveSyncTimer);
      }
      appState.driveFolderId = '';
      appState.driveSnapshotFileId = '';
      appState.driveReady = false;
      appState.driveSyncTimer = 0;
      appState.driveSyncPromise = null;
      appState.driveSyncQueued = false;
    }

    function fileExtension(name) {
      const match = String(name || '').toLowerCase().match(/\.([a-z0-9]+)$/);
      return match ? match[1] : '';
    }

    function inferMimeType(file) {
      if (file && file.type) {
        return file.type;
      }
      return EXTENSION_MIME_TYPES[fileExtension(file && file.name)] || 'application/octet-stream';
    }

    function formatBytes(value) {
      const bytes = Number(value || 0);
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function truncateText(value, maxChars) {
      const limit = maxChars || MAX_TEXT_ATTACHMENT_CHARS;
      const text = String(value || '').replace(/\u0000/g, '').trim();
      if (!text) {
        return '';
      }
      if (text.length <= limit) {
        return text;
      }
      return text.slice(0, limit) + '\n\n[Contenido truncado]';
    }

    function attachmentKindFromMime(mimeType, name) {
      const mime = String(mimeType || '').toLowerCase();
      const ext = fileExtension(name);
      if (mime === 'application/pdf' || ext === 'pdf') return 'pdf';
      if (mime.startsWith('image/')) return 'image';
      if (mime.startsWith('audio/')) return 'audio';
      if (mime.startsWith('video/')) return 'video';
      if (ext === 'docx' || ext === 'odt') return 'doc';
      if (ext === 'xlsx' || ext === 'xls' || ext === 'ods' || ext === 'csv' || ext === 'tsv') return 'sheet';
      if (mime.startsWith('text/') || mime.includes('json') || mime.includes('xml') || mime.includes('javascript') || mime.includes('typescript') || mime.includes('yaml') || ext === 'md' || ext === 'log') return 'text';
      return 'binary';
    }

      return [
        '<svg viewBox="0 0 24 24" fill="none" stroke="' + color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">',
        '  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>',
        '  <polyline points="14 2 14 8 20 8"></polyline>',
        '</svg>'
      ].join('');
    }

    function arrayBufferToBase64(buffer) {
      let binary = '';
      const bytes = new Uint8Array(buffer);
      const chunkSize = 0x8000;
      for (let index = 0; index < bytes.length; index += chunkSize) {
        const chunk = bytes.subarray(index, index + chunkSize);
        binary += String.fromCharCode.apply(null, chunk);
      }
      return btoa(binary);
    }

    async function readPdfAsText(file) {
      if (!(window.pdfjsLib && window.pdfjsLib.getDocument)) {
        throw new Error('pdf.js no esta cargado.');
      }
      if (window.pdfjsLib.GlobalWorkerOptions && !window.pdfjsLib.GlobalWorkerOptions.workerSrc) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.min.js';
      }
      const buffer = await file.arrayBuffer();
      const pdf = await window.pdfjsLib.getDocument({ data: buffer }).promise;
      const parts = [];
      const maxPages = Math.min(pdf.numPages, MAX_PDF_PAGES);
      for (let pageNumber = 1; pageNumber <= maxPages; pageNumber += 1) {
        const page = await pdf.getPage(pageNumber);
        const content = await page.getTextContent();
        const text = content.items.map((item) => item && item.str ? item.str : '').join(' ').replace(/\s+/g, ' ').trim();
        if (text) {
          parts.push('[Pagina ' + pageNumber + ']\n' + text);
        }
      }
      return truncateText(parts.join('\n\n'), MAX_TEXT_ATTACHMENT_CHARS);
    }

    async function readDocxAsText(file) {
      if (!(window.mammoth && window.mammoth.extractRawText)) {
        throw new Error('Mammoth no esta cargado.');
      }
      const result = await window.mammoth.extractRawText({
        arrayBuffer: await file.arrayBuffer()
      });
      return truncateText(result && result.value ? result.value : '', MAX_TEXT_ATTACHMENT_CHARS);
    }

    async function readSpreadsheetAsText(file) {
      if (!(window.XLSX && window.XLSX.read)) {
        throw new Error('SheetJS no esta cargado.');
      }
      const workbook = window.XLSX.read(await file.arrayBuffer(), {
        type: 'array'
      });
      const chunks = [];
      workbook.SheetNames.forEach((sheetName) => {
        const worksheet = workbook.Sheets[sheetName];
        const csv = window.XLSX.utils.sheet_to_csv(worksheet, {
          blankrows: false
        }).trim();
        if (csv) {
          chunks.push('[Hoja: ' + sheetName + ']\n' + csv);
        }
      });
      return truncateText(chunks.join('\n\n'), MAX_TEXT_ATTACHMENT_CHARS);
    }

    async function buildInlineAttachment(file, mimeType, kind) {
      if (file.size > MAX_INLINE_ATTACHMENT_BYTES) {
        throw new Error('"' + file.name + '" pesa ' + formatBytes(file.size) + '. Para adjuntos binarios el limite actual es ' + formatBytes(MAX_INLINE_ATTACHMENT_BYTES) + '.');
      }
      return {
        id: uid('att'),
        name: file.name,
        size: file.size,
        mimeType,
        kind,
        source: 'inline',
        part: {
          inlineData: {
            mimeType,
            data: arrayBufferToBase64(await file.arrayBuffer())
          }
        }
      };
    }

    function buildTextAttachment(file, mimeType, kind, text) {
      const trimmed = truncateText(text, MAX_TEXT_ATTACHMENT_CHARS);
      if (!trimmed) {
        throw new Error('No pude extraer texto util de "' + file.name + '".');
      }
      return {
        id: uid('att'),
        name: file.name,
        size: file.size,
        mimeType,
        kind,
        source: 'text',
        extractedText: trimmed,
        part: {
          text: [
            'Archivo adjunto: ' + file.name,
            'Tipo: ' + mimeType,
            '',
            trimmed
          ].join('\n')
        }
      };
    }

    async function prepareAttachment(file) {
      const mimeType = inferMimeType(file);
      const kind = attachmentKindFromMime(mimeType, file.name);

      if (kind === 'pdf') {
        try {
          return await buildInlineAttachment(file, mimeType, kind);
        } catch (error) {
          const text = await readPdfAsText(file);
          return buildTextAttachment(file, mimeType, kind, text);
        }
      }
      if (kind === 'doc') {
        return buildTextAttachment(file, mimeType, kind, await readDocxAsText(file));
      }
      if (kind === 'sheet') {
        if (fileExtension(file.name) === 'csv' || fileExtension(file.name) === 'tsv') {
          return buildTextAttachment(file, mimeType, kind, await file.text());
        }
        return buildTextAttachment(file, mimeType, kind, await readSpreadsheetAsText(file));
      }
      if (kind === 'text') {
        return buildTextAttachment(file, mimeType, kind, await file.text());
      }
      return buildInlineAttachment(file, mimeType, kind);
    }

    async function addFilesToComposer(fileList) {
      const files = Array.from(fileList || []);
      if (!files.length) {
        return;
      }
      appState.attachmentBusy = true;
      updateSendUi();
      setComposerStatus('Procesando adjuntos...');
      try {
        for (const file of files) {
          const attachment = await prepareAttachment(file);
          appState.composerAttachments.push(attachment);
        }
        renderComposerAttachments();
        if (!appState.busy) {
          setComposerStatus('');
        }
      } catch (error) {
        showToast('Adjuntos', error.message);
        setComposerStatus('No se pudo adjuntar uno de los archivos.');
      } finally {
        appState.attachmentBusy = false;
        updateSendUi();
        if (!appState.busy) {
          window.setTimeout(() => {
            if (!appState.busy) {
              setComposerStatus('');
            }
          }, 1200);
        }
      }
    }

    function serializeAttachmentForStorage(attachment) {
      if (!attachment || typeof attachment !== 'object') {
        return null;
      }
      return {
        id: typeof attachment.id === 'string' ? attachment.id : uid('att'),
        name: typeof attachment.name === 'string' ? attachment.name : 'Archivo',
        size: Number(attachment.size || 0),
        mimeType: typeof attachment.mimeType === 'string' ? attachment.mimeType : 'application/octet-stream',
        kind: typeof attachment.kind === 'string' ? attachment.kind : 'binary',
        source: typeof attachment.source === 'string' ? attachment.source : 'text'
      };
    }

    function serializePartForStorage(part, attachmentList) {
      if (!part || typeof part !== 'object') {
        return null;
      }
      if (typeof part.text === 'string') {
        return {
          text: part.text
        };
      }
      if (part.inlineData && part.inlineData.mimeType) {
        const match = (attachmentList || []).find((item) => item.mimeType === part.inlineData.mimeType);
        return {
          text: '[Adjunto binario: ' + (match ? match.name : part.inlineData.mimeType) + ']'
        };
      }
      return null;
    }

    function rememberManualLogout() {

    function shouldAutoRestoreAuth() {
      return hasOauthConfig() &&
        location.protocol !== 'file:' &&
        localStorage.getItem(AUTH_SKIP_RESTORE_KEY) !== '1';
    }

    function canRestoreStoredAuth(authState) {
      if (!authState || typeof authState !== 'object') {
        return false;
      }
      if (!shouldAutoRestoreAuth()) {
        return false;
      }
      if (!authState.accessToken || !authState.profile) {
        return false;
      }
      const expiresAt = Number(authState.expiresAt || 0);
      if (expiresAt && Date.now() >= expiresAt - AUTH_EXPIRY_SKEW_MS) {
        return false;
      }
      return true;
    }

    function buildStoredAuthState() {
      if (!appState.accessToken || !appState.profile) {

        accessToken: appState.accessToken,
        expiresAt: Number(appState.accessTokenExpiresAt || 0),
        profile: appState.profile,

      const firstUser = messages.find((message) => message.role === 'user' && message.content.trim());

        if (firstAttachmentMessage) {
          const names = firstAttachmentMessage.attachments.map((item) => item.name).filter(Boolean);
          if (names.length) {
            return names.length === 1 ? names[0] : names[0] + ' +' + (names.length - 1);

        return 'Nuevo chat';

      const flat = firstUser.content.replace(/\s+/g, ' ').trim();

    function renderInline(text) {
      return escapeHtml(text)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    }

    function fallbackRenderMarkdown(text) {
      const fences = [];
      let html = escapeHtml(text).replace(/```([\s\S]*?)```/g, function(match, code) {
        const token = '__CODE_BLOCK_' + fences.length + '__';
        fences.push('<pre><code>' + code.trim() + '</code></pre>');
        return token;
      });

      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

      const blocks = html.split(/\n\s*\n/).map((block) => block.trim()).filter(Boolean);
      const rendered = blocks.map((block) => {
        const lines = block.split('\n');
        if (lines.every((line) => /^[-*] /.test(line))) {
          return '<ul>' + lines.map((line) => '<li>' + renderInline(line.replace(/^[-*] /, '')) + '</li>').join('') + '</ul>';
        }
        if (lines.every((line) => /^\d+\. /.test(line))) {
          return '<ol>' + lines.map((line) => '<li>' + renderInline(line.replace(/^\d+\. /, '')) + '</li>').join('') + '</ol>';
        }
        if (/^<h[1-3]>/.test(block) || /^<pre>/.test(block) || /^<ul>/.test(block) || /^<ol>/.test(block)) {
          return block;
        }
        return '<p>' + renderInline(block).replace(/\n/g, '<br>') + '</p>';
      }).join('');

      return fences.reduce((acc, code, index) => acc.replace('__CODE_BLOCK_' + index + '__', code), rendered);
    }

    function renderMarkdown(text) {
      if (!text) {
        return '';
      }

      if (!(window.marked && window.DOMPurify)) {
        return fallbackRenderMarkdown(text);
      }

      const rawHtml = window.marked.parse(text, {
        gfm: true,
        breaks: true
      });

      return window.DOMPurify.sanitize(rawHtml);
    }

    function enhanceRichContent(root) {
      if (!root) {
        return;

      Array.from(root.querySelectorAll('a[href]')).forEach((link) => {
        link.target = '_blank';

      });

      if (!window.renderMathInElement) {
        return;
      }

      window.renderMathInElement(root, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '\\[', right: '\\]', display: true },
          { left: '\\(', right: '\\)', display: false },
          { left: '$', right: '$', display: false }
        ],
        throwOnError: false,
        ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      });
    }

    function renderMsgActions(message, isLast) {
      if (message.pending) return '';
      const ic = msgActionIcons();

        headers: {

        }
      });

    function escapeDriveQueryValue(value) {
      return String(value || '')
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'");
    }

    async function driveFetch(url, options, allowRetry) {
      if (!appState.accessToken) {
        throw new Error('Inicia sesion con Google para sincronizar con Drive.');
      }

      const requestOptions = Object.assign({}, options);
      const headers = new Headers(requestOptions.headers || {});
      headers.set('Authorization', 'Bearer ' + appState.accessToken);
      requestOptions.headers = headers;

      const response = await fetch(url, requestOptions);
      if (response.status === 401 && allowRetry !== false) {
        await loginWithGoogle({
          interactive: false,
          toast: false,
          skipDriveBootstrap: true
        });
        return driveFetch(url, options, false);
      }
      return response;
    }

    function extractDriveErrorMessage(payload, fallback, status) {
      if (payload && payload.error && payload.error.message) {
        return payload.error.message;
      }
      return fallback + ' (HTTP ' + status + ')';
    }

    async function driveFetchJson(url, options, allowRetry, fallbackMessage) {
      const response = await driveFetch(url, options, allowRetry);
      const payload = await response.json().catch(() => null);
      if (!response.ok) {
        throw new Error(extractDriveErrorMessage(payload, fallbackMessage || 'Error de Drive', response.status));
      }
      return payload;
    }

    async function driveFetchText(url, options, allowRetry, fallbackMessage) {
      const response = await driveFetch(url, options, allowRetry);
      const text = await response.text();
      if (!response.ok) {
        let payload = null;
        try {
          payload = text ? JSON.parse(text) : null;
        } catch (error) {}
        throw new Error(extractDriveErrorMessage(payload, fallbackMessage || 'Error de Drive', response.status));
      }
      return text;
    }

    async function listDriveFiles(query, pageSize) {
      const params = new URLSearchParams({
        q: query,
        spaces: 'drive',
        pageSize: String(pageSize || 10),
        fields: 'files(id,name,mimeType,modifiedTime,parents)'
      });
      const payload = await driveFetchJson(
        'https://www.googleapis.com/drive/v3/files?' + params.toString(),
        {
          method: 'GET'
        },
        true,
        'No se pudo listar Drive.'
      );
      return Array.isArray(payload && payload.files) ? payload.files : [];
    }

    async function findDriveFolderId() {
      if (appState.driveFolderId) {
        return appState.driveFolderId;
      }
      const taggedFolders = await listDriveFiles(
        "mimeType='application/vnd.google-apps.folder' and trashed=false and appProperties has { key='" + DRIVE_FOLDER_TAG + "' and value='1' }",
        5
      );
      const taggedFolder = taggedFolders[0];
      if (taggedFolder && taggedFolder.id) {
        appState.driveFolderId = taggedFolder.id;
        return appState.driveFolderId;
      }

      const namedFolders = await listDriveFiles(
        "mimeType='application/vnd.google-apps.folder' and trashed=false and name='" + escapeDriveQueryValue(DRIVE_FOLDER_NAME) + "'",
        5
      );
      const namedFolder = namedFolders[0];
      if (namedFolder && namedFolder.id) {
        appState.driveFolderId = namedFolder.id;
        return appState.driveFolderId;
      }
      return '';
    }

    async function ensureDriveFolderId() {
      const existingId = await findDriveFolderId();
      if (existingId) {
        return existingId;
      }
      const folder = await driveFetchJson(
        'https://www.googleapis.com/drive/v3/files?fields=id,name',
        {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            name: DRIVE_FOLDER_NAME,
            mimeType: 'application/vnd.google-apps.folder',
            appProperties: {
              [DRIVE_FOLDER_TAG]: '1'
            }
          })
        },
        true,
        'No se pudo crear la carpeta de Drive.'
      );
      appState.driveFolderId = folder.id || '';
      return appState.driveFolderId;
    }

    async function findDriveSnapshotFileId(folderId) {
      if (appState.driveSnapshotFileId) {
        return appState.driveSnapshotFileId;
      }
      if (!folderId) {
        return '';
      }
      const taggedFiles = await listDriveFiles(
        "'" + escapeDriveQueryValue(folderId) + "' in parents and trashed=false and appProperties has { key='" + DRIVE_SNAPSHOT_TAG + "' and value='1' }",
        5
      );
      const taggedFile = taggedFiles[0];
      if (taggedFile && taggedFile.id) {
        appState.driveSnapshotFileId = taggedFile.id;
        return appState.driveSnapshotFileId;
      }

      const namedFiles = await listDriveFiles(
        "'" + escapeDriveQueryValue(folderId) + "' in parents and trashed=false and name='" + escapeDriveQueryValue(DRIVE_SNAPSHOT_NAME) + "'",
        5
      );
      const namedFile = namedFiles[0];
      if (namedFile && namedFile.id) {
        appState.driveSnapshotFileId = namedFile.id;
        return appState.driveSnapshotFileId;
      }
      return '';
    }

    function buildDriveMultipartBody(metadata, content, mimeType) {
      const boundary = 'inhouse_drive_' + Math.random().toString(36).slice(2);
      const body = [
        '--' + boundary,
        'Content-Type: application/json; charset=UTF-8',
        '',
        JSON.stringify(metadata),
        '--' + boundary,
        'Content-Type: ' + (mimeType || 'application/json') + '; charset=UTF-8',
        '',
        content,
        '--' + boundary + '--',
        ''
      ].join('\r\n');
      return {
        body,
        contentType: 'multipart/related; boundary=' + boundary
      };
    }

    async function readDriveSnapshot() {
      const folderId = await findDriveFolderId();
      if (!folderId) {
        return null;
      }
      const fileId = await findDriveSnapshotFileId(folderId);
      if (!fileId) {
        return null;
      }
      const raw = await driveFetchText(
        'https://www.googleapis.com/drive/v3/files/' + encodeURIComponent(fileId) + '?alt=media',
        {
          method: 'GET'
        },
        true,
        'No se pudo descargar el historial de Drive.'
      );
      return normalizeSnapshot(JSON.parse(raw));
    }

    async function persistDriveSnapshot(snapshot) {
      if (!appState.accessToken) {
        return;
      }
      const normalizedSnapshot = normalizeSnapshot(snapshot) || buildStateSnapshot();
      const folderId = await ensureDriveFolderId();
      const existingFileId = await findDriveSnapshotFileId(folderId);
      const metadata = {
        name: DRIVE_SNAPSHOT_NAME,
        mimeType: 'application/json',
        description: 'inhouse learn chat snapshot',
        appProperties: {
          [DRIVE_SNAPSHOT_TAG]: '1'
        }
      };
      if (!existingFileId) {
        metadata.parents = [folderId];
      }

      const multipart = buildDriveMultipartBody(
        metadata,
        JSON.stringify(normalizedSnapshot, null, 2),
        'application/json'
      );
      const response = await driveFetchJson(
        existingFileId
          ? 'https://www.googleapis.com/upload/drive/v3/files/' + encodeURIComponent(existingFileId) + '?uploadType=multipart&fields=id,modifiedTime'
          : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,modifiedTime',
        {
          method: existingFileId ? 'PATCH' : 'POST',
          headers: {
            'Content-Type': multipart.contentType
          },
          body: multipart.body
        },
        true,
        'No se pudo guardar el historial en Drive.'
      );
      appState.driveFolderId = folderId;
      appState.driveSnapshotFileId = response && response.id ? response.id : existingFileId;
      appState.driveReady = true;
    }

    async function ensureDriveReady() {
      if (!appState.accessToken) {
        return;
      }
      if (appState.driveReady) {
        return;
      }

      const localSnapshot = buildStateSnapshot();
      const remoteSnapshot = await readDriveSnapshot();
      const localHasContent = snapshotHasMeaningfulContent(localSnapshot);
      const remoteHasContent = snapshotHasMeaningfulContent(remoteSnapshot);

      if (remoteHasContent && (!localHasContent || snapshotFreshness(remoteSnapshot) > snapshotFreshness(localSnapshot))) {
        applySnapshotToState(remoteSnapshot);
        appState.driveReady = true;
        return;
      }

      appState.driveReady = true;
      await persistDriveSnapshot(localSnapshot);
    }

    function scheduleDriveSync() {
      if (!appState.accessToken || !appState.driveReady) {
        return;
      }
      if (appState.driveSyncTimer) {
        window.clearTimeout(appState.driveSyncTimer);
      }
      appState.driveSyncTimer = window.setTimeout(() => {
        appState.driveSyncTimer = 0;
        if (appState.driveSyncPromise) {
          appState.driveSyncQueued = true;
          return;
        }
        appState.driveSyncPromise = persistDriveSnapshot(buildStateSnapshot())
          .catch((error) => {
            console.error('Drive sync error:', error);
            showToast('Drive', 'No se pudo guardar el chat en Drive. Revisa que Google Drive API este activada.');
          })
          .finally(() => {
            appState.driveSyncPromise = null;
            if (appState.driveSyncQueued) {
              appState.driveSyncQueued = false;
              scheduleDriveSync();
            }
          });
      }, DRIVE_SYNC_DEBOUNCE_MS);
    }

    function buildContents(messages) {
      return messages
        .filter((message) => {
          if (message.pending) {
            return false;
          }
          if (Array.isArray(message.parts) && message.parts.length) {
            return true;
          }
          return !!(message.content && message.content.trim());
        })
        .map((message) => ({
          role: message.role === 'assistant' ? 'model' : 'user',
          parts: Array.isArray(message.parts) && message.parts.length
            ? cloneParts(message.parts)
            : [{ text: message.content }]
        }));
    }

      const generationConfig = {
        temperature: APP_CONFIG.TEMPERATURE,
        topP: APP_CONFIG.TOP_P,
        maxOutputTokens: APP_CONFIG.MAX_OUTPUT_TOKENS
      };
      const thinkingLevel = currentThinkingLevel(chat);
      if (thinkingLevel) {
        generationConfig.thinkingConfig = {
          thinkingLevel
        };
      }

      return {
        systemInstruction: {
          parts: [{ text: APP_CONFIG.SYSTEM_PROMPT }]
        },
        contents: buildContents(messages),
        generationConfig
      };
    }

    function extractTextFromResponse(data) {
      const parts = data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts;
      if (Array.isArray(parts)) {
        const text = extractVisibleTextFromParts(parts);
        if (text) {
          return text;
        }
      }
      if (data && data.promptFeedback && data.promptFeedback.blockReason) {
        return 'La respuesta fue bloqueada: ' + data.promptFeedback.blockReason;
      }
      return 'No llego texto util desde Gemini.';
    }

    function extractModelParts(data) {
      const parts = data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts;

    function deleteChat(chatId) {
      const targetId = String(chatId || '');
      const targetChat = appState.chats.find((chat) => chat.id === targetId);
      if (!targetChat) {
        return;
      }

      const label = targetChat.title && targetChat.title !== 'Nuevo chat'
        ? '"' + targetChat.title + '"'
        : 'este chat';
      if (!window.confirm('Se eliminara ' + label + '. Continuar?')) {
        return;
      }

      if (appState.busy && appState.activeChatId === targetId && appState.activeController) {
        appState.activeController.abort();
      }

      appState.chats = appState.chats.filter((chat) => chat.id !== targetId);

      if (!appState.chats.length) {
        const chat = createChat();
        appState.chats.unshift(chat);
        appState.activeChatId = chat.id;
      } else if (appState.activeChatId === targetId) {
        appState.activeChatId = appState.chats[0].id;
      }

      saveState();
      updateConfigUi();
      renderHistory();
      renderThread();
      setComposerStatus('');
    }

    function editMessage(msgId) {
      if (appState.busy) return;
      var chat = getActiveChat();
      var idx = chat.messages.findIndex(function(m) { return m.id === msgId; });
      if (idx < 0) return;
      var msg = chat.messages[idx];
      if (msg.role !== 'user') return;
      elements.composer.value = msg.content;
      chat.messages = chat.messages.slice(0, idx);
      touchChat(chat);
      autoResizeComposer();
      updateSendUi();
      renderHistory();
      renderThread();
      elements.composer.focus();
    }

    async function regenerateMessage(msgId) {
      if (appState.busy) return;
      var chat = getActiveChat();
      var idx = chat.messages.findIndex(function(m) { return m.id === msgId; });
      if (idx < 0) return;
      var msg = chat.messages[idx];
      if (msg.role !== 'assistant') return;

      if (!appState.accessToken) {
        try { await loginWithGoogle(); } catch (e) { setComposerStatus('Falta iniciar sesion.'); return; }
      }

      var currentContent = getVisibleContent(msg);
      if (!msg.alternatives) msg.alternatives = [];
      if (currentContent && !msg.pending) {
        msg.alternatives.push({ content: currentContent, createdAt: msg.createdAt });
      }
      msg.pending = true;
      msg.content = '';
      msg.activeAlternative = 0;
      touchChat(chat);
      appState.busy = true;
      appState.activeController = new AbortController();
      setComposerStatus('Regenerando con ' + activeModelLabel(chat) + '...');
      updateSendUi();
      renderThread();
      try {
        var reply = await callGemini(chat, appState.activeController.signal);
        msg.pending = false;
        msg.content = reply.text;
        msg.parts = reply.parts;
        msg.activeAlternative = 0;
        touchChat(chat);
        setComposerStatus('');
      } catch (error) {
        msg.pending = false;
        if (error.name === 'AbortError') {
          if (msg.alternatives.length) {
            var last = msg.alternatives.pop();
            msg.content = last.content;
          }
          setComposerStatus('Regeneracion cancelada.');
        } else {
          msg.content = 'Error: ' + error.message;
          msg.parts = [{ text: msg.content }];
          setComposerStatus('Error al regenerar.');
        }
        touchChat(chat);
      } finally {
        appState.busy = false;
        appState.activeController = null;
        saveState();
        updateSendUi();
        renderHistory();
        renderThread();
      }
    }

    function switchAlternative(msgId, dir) {
      var chat = getActiveChat();
      var msg = chat.messages.find(function(m) { return m.id === msgId; });
      if (!msg) return;
      var alts = msg.alternatives || [];
      var total = alts.length + 1;
      var current = Math.min(Number(msg.activeAlternative) || 0, total - 1);
      var next = current + dir;
      if (next < 0 || next >= total) return;
      msg.activeAlternative = next;
      saveState();
      renderThread();
    }

    function copyMessageContent(msgId) {
      var chat = getActiveChat();
      var msg = chat.messages.find(function(m) { return m.id === msgId; });
      if (!msg) return;
      var text = getVisibleContent(msg);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
          showToast('Copiado', 'Texto copiado al portapapeles.');
        });
      } else {
        var ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Copiado', 'Texto copiado al portapapeles.');
      }
    }

    /* ─── ATTACHMENT PREVIEW ────────────────────────── */

    function openAttachmentPreview(msgId, attId) {
      var chat = getActiveChat();
      var msg = chat.messages.find(function(m) { return m.id === msgId; });
      if (!msg) return;
      var att = (msg.attachments || []).find(function(a) { return a.id === attId; });
      if (!att) return;
      var overlay = document.getElementById('preview-overlay');
      var title = document.getElementById('preview-title');
      var body = document.getElementById('preview-body');
      title.textContent = att.name || 'Preview';
      body.innerHTML = '';
      var part = (msg.parts || []).find(function(p) {
        return p.inlineData && p.inlineData.mimeType && (
          (att.mimeType && p.inlineData.mimeType === att.mimeType) ||
          (att.kind === 'image')
        );
      });
      if (att.kind === 'image' && part && part.inlineData && part.inlineData.data) {
        var img = document.createElement('img');
        img.src = 'data:' + part.inlineData.mimeType + ';base64,' + part.inlineData.data;
        img.alt = att.name || 'Imagen';
        body.appendChild(img);
      } else {
        var textPart = (msg.parts || []).find(function(p) {
          return typeof p.text === 'string' && p.text.includes(att.name);
        });
        var extractedText = '';
        if (att.source === 'text') {
          for (var i = 0; i < msg.parts.length; i++) {
            if (typeof msg.parts[i].text === 'string' && msg.parts[i].text !== msg.content) {
              extractedText = msg.parts[i].text;
              break;
            }
          }
        }
        if (extractedText) {
          var pre = document.createElement('pre');
          pre.textContent = extractedText.slice(0, 20000);
          body.appendChild(pre);
        } else {
          var p = document.createElement('p');
          p.style.cssText = 'color:#fff;opacity:0.7;font-size:0.9rem;';
          p.textContent = 'Preview no disponible para este archivo. El contenido fue procesado al enviarlo.';
          body.appendChild(p);
        }
      }
      overlay.classList.remove('hidden');
    }

    function closeAttachmentPreview() {
      document.getElementById('preview-overlay').classList.add('hidden');
      document.getElementById('preview-body').innerHTML = '';
    }

    /* ─── SIDEBAR: RENAME + PIN ─────────────────────── */

    function startRenameChat(chatId) {
      var titleEl = document.querySelector('[data-title-chat-id="' + chatId + '"]');
      if (!titleEl) return;
      var chat = appState.chats.find(function(c) { return c.id === chatId; });
      if (!chat) return;
      var input = document.createElement('input');
      input.type = 'text';
      input.className = 'chat-rename-input';
      input.value = chat.customTitle || chat.title || '';
      titleEl.textContent = '';
      titleEl.appendChild(input);
      input.focus();
      input.select();
      function commit() {
        var val = input.value.trim();
        if (val && val !== deriveTitle(chat.messages)) {
          chat.customTitle = val;
        } else {
          chat.customTitle = null;
        }
        chat.title = deriveTitle(chat.messages, chat);
        saveState();
        renderHistory();
      }
      input.addEventListener('blur', commit);
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { input.value = chat.title || ''; input.blur(); }
      });
    }

    function togglePinChat(chatId) {
      var chat = appState.chats.find(function(c) { return c.id === chatId; });
      if (!chat) return;
      chat.pinned = !chat.pinned;
      saveState();
      renderHistory();
    }

    function bindEvents() {
      elements.composer.addEventListener('input', () => {
        autoResizeComposer();
        updateSendUi();
      });

      elements.composer.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          handleSend();
        }
      });

      elements.attachBtn.addEventListener('click', () => {
        if (!appState.busy && !appState.attachmentBusy) {
          elements.fileInput.click();
        }
      });
      elements.fileInput.addEventListener('change', async () => {
        await addFilesToComposer(elements.fileInput.files);
        elements.fileInput.value = '';
      });
      elements.sendBtn.addEventListener('click', handleSend);
      elements.newChatBtn.addEventListener('click', newChat);
      elements.clearChatBtn.addEventListener('click', clearActiveChat);
      elements.modelSelect.addEventListener('change', () => {
        const chat = getActiveChat();
        chat.model = normalizeModelId(elements.modelSelect.value);
        chat.thinkingLevel = defaultThinkingLevelForModel(chat.model);
        touchChat(chat);
        updateConfigUi();
        renderHistory();
        setComposerStatus('');
      });
      elements.thinkingSelect.addEventListener('change', () => {
        const chat = getActiveChat();
        chat.thinkingLevel = normalizeThinkingLevelForModel(chat.model, elements.thinkingSelect.value);
        touchChat(chat);
        updateConfigUi();
        renderHistory();
        setComposerStatus('');
      });
      elements.loginBtn.addEventListener('click', async () => {
        try {
          await loginWithGoogle();
        } catch (error) {
          showToast('OAuth', error.message);
        }
      });
      elements.logoutBtn.addEventListener('click', logoutGoogle);
      document.getElementById('preview-close').addEventListener('click', closeAttachmentPreview);
      document.getElementById('preview-overlay').addEventListener('click', function(e) {
        if (e.target.id === 'preview-overlay') closeAttachmentPreview();
      });
    }



    function updateConfigUi() {
      let label = 'Login requerido';
      if (!hasOauthConfig()) {
        label = 'Falta configuracion';
      }
      if (appState.accessToken) {
        label = appState.driveReady ? 'Gemini + Drive' : 'Gemini OAuth';
      }
      elements.transportLabel.textContent = label;
      elements.modelBadge.textContent = activeModelBadge();
      renderModelControls();
      elements.configCopy.style.display = hasOauthConfig() ? 'none' : 'block';
      elements.configCopy.textContent = hasOauthConfig()
        ? ''
        : 'Configura GOOGLE_CLIENT_ID y GOOGLE_CLOUD_PROJECT en el HTML.';
      elements.originCopy.style.display = 'none';
      elements.originCopy.textContent = '';
    }

    function updateAuthUi() {
      const signedIn = !!appState.profile;
      elements.profileCard.classList.toggle('hidden', !signedIn);
      elements.logoutBtn.classList.toggle('hidden', !signedIn);
      elements.loginBtn.classList.toggle('hidden', signedIn);
      if (signedIn) {
        elements.profileAvatar.src = appState.profile.picture || '';
        const sidebarAvatar = document.getElementById('profile-avatar-sidebar');
        if (sidebarAvatar) sidebarAvatar.src = appState.profile.picture || '';
        elements.profileName.textContent = appState.profile.name || 'Cuenta Google';
        elements.profileEmail.textContent = appState.profile.email || '';
        elements.authCopy.textContent = 'Sesion lista. Gemini usara el token OAuth de esta cuenta.';
      } else {
        elements.authCopy.textContent = hasOauthConfig()
          ? 'Inicia sesion y ya puedes usar Gemini. No hace falta meter API keys en el navegador.'
          : 'Falta terminar la configuracion OAuth del sitio.';
      }
    }

    async function requestGoogleAccessToken(promptMode) {
      ensureOauthConfig();
      await waitForGoogle();
      const scopes = [
        'https://www.googleapis.com/auth/userinfo.email',
        'https://www.googleapis.com/auth/userinfo.profile',
        'https://www.googleapis.com/auth/generative-language.retriever',
        'https://www.googleapis.com/auth/cloud-platform',
        DRIVE_SCOPE
      ];

      return new Promise((resolve, reject) => {
        const tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: APP_CONFIG.GOOGLE_CLIENT_ID,
          scope: scopes.join(' '),
          callback: (response) => {
            if (response && response.access_token) {
              resolve(response);
              return;
            }
            reject(new Error('No se recibio access token.'));
          },
          error_callback: (error) => {
            reject(new Error(error && error.message ? error.message : 'OAuth cancelado.'));
          }
        });
        tokenClient.requestAccessToken({
          prompt: promptMode
        });
      });
    }

    async function syncGoogleSession(tokenResponse, options) {
      appState.accessToken = tokenResponse.access_token;
      appState.accessTokenExpiresAt = tokenResponse && tokenResponse.expires_in
        ? Date.now() + (Number(tokenResponse.expires_in) * 1000)
        : 0;
      clearManualLogoutFlag();
      appState.profile = await fetchProfile(appState.accessToken);
      updateAuthUi();
      updateConfigUi();
      if (!options || !options.skipDriveBootstrap) {
        try {
          await ensureDriveReady();
          updateConfigUi();
          renderHistory();
          renderThread();
          updateSendUi();
        } catch (error) {
          console.error('Drive bootstrap error:', error);
          showToast('Drive', 'No se pudo sincronizar con Drive. Revisa que Google Drive API este activada.');
        }
      } else {
        scheduleDriveSync();
      }
      if (!options || options.toast !== false) {
        showToast('Sesion iniciada', 'La cuenta Google ya esta lista.');
      }
      saveState();
    }

    async function loginWithGoogle(options) {
      const settings = Object.assign({
        interactive: true,
        toast: true
      }, options);
      const promptMode = typeof settings.prompt === 'string'
        ? settings.prompt
        : (settings.interactive
          ? (appState.accessToken ? '' : 'consent')
          : 'none');
      const tokenResponse = await requestGoogleAccessToken(promptMode);
      await syncGoogleSession(tokenResponse, settings);
    }

    async function tryAutoRestoreGoogleSession() {
      if (!shouldAutoRestoreAuth() || appState.accessToken) {
        return;
      }
      try {
        await loginWithGoogle({
          interactive: false,
          toast: false,
          prompt: 'none'
        });
      } catch (error) {
        console.warn('No se pudo restaurar la sesion OAuth automaticamente:', error);
      }
    }

    async function bootstrapRestoredSession() {
      if (!appState.accessToken || appState.driveReady) {
        return;
      }
      try {
        await ensureDriveReady();
        updateConfigUi();
        renderHistory();
        renderThread();
        updateSendUi();
        saveState({
          skipDrive: true
        });
      } catch (error) {
        console.warn('No se pudo reactivar Drive con la sesion restaurada:', error);
      }
    }

    function buildGeminiEndpoint(chat) {
      return 'https://generativelanguage.googleapis.com/v1beta/models/' +
        encodeURIComponent(activeModelName(chat)) +
        ':generateContent';
    }

    async function callGemini(chat, signal, allowRetry) {
      ensureOauthConfig();
      if (!appState.accessToken) {
        throw new Error('Inicia sesion con Google para usar Gemini.');
      }

      const response = await fetch(buildGeminiEndpoint(chat), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + appState.accessToken,
          'x-goog-user-project': googleProjectRef()
        },
        body: JSON.stringify(buildRequestBody(chat.messages, chat)),
        signal
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        if (response.status === 401 && allowRetry !== false) {
          await loginWithGoogle({
            interactive: false,
            toast: false,
            skipDriveBootstrap: true
          });
          return callGemini(chat, signal, false);
        }

        const message = data && data.error && data.error.message
          ? data.error.message
          : 'Error HTTP ' + response.status;
        throw new Error(message);
      }

      return {
        text: extractTextFromResponse(data),
        parts: extractModelParts(data)
      };
    }

    function buildUserMessageParts(prompt, attachments) {
      const parts = [];
      if (prompt) {
        parts.push({
          text: prompt
        });
      }
      (attachments || []).forEach((attachment) => {
        if (attachment && attachment.part) {
          parts.push(cloneParts([attachment.part])[0]);
        }
      });
      return parts;
    }

    async function handleSend() {
      if (appState.busy) {
        if (appState.activeController) {
          appState.activeController.abort();
        }
        return;
      }

      const prompt = elements.composer.value.trim();
      const attachments = (appState.composerAttachments || []).slice();
      if (!prompt && !attachments.length) {
        return;
      }
      if (appState.attachmentBusy) {
        setComposerStatus('Espera a que terminen de procesarse los adjuntos.');
        return;
      }

      if (!appState.accessToken) {
        try {
          await loginWithGoogle();
        } catch (error) {
          showToast('OAuth', error.message);
          setComposerStatus('Falta iniciar sesion.');
          return;
        }
      }

      const chat = getActiveChat();
      const parts = buildUserMessageParts(prompt, attachments);
      const fallbackContent = prompt || attachments.map((item) => item.name).join(', ');
      const userMessage = createMessage('user', fallbackContent, false, {
        parts,
        attachments
      });
      const assistantMessage = createMessage('assistant', '', true);

      chat.messages.push(userMessage, assistantMessage);
      touchChat(chat);
      elements.composer.value = '';
      resetComposerAttachments();
      autoResizeComposer();
      appState.busy = true;
      appState.activeController = new AbortController();
      setComposerStatus('Consultando ' + activeModelLabel(chat) + '...');
      updateSendUi();
      renderHistory();
      renderThread();

      try {
        const reply = await callGemini(chat, appState.activeController.signal);
        assistantMessage.pending = false;
        assistantMessage.content = reply.text;
        assistantMessage.parts = reply.parts;
        touchChat(chat);
        setComposerStatus('');
      } catch (error) {
        if (error.name === 'AbortError') {
          chat.messages = chat.messages.filter((message) => message.id !== assistantMessage.id);
          setComposerStatus('Solicitud cancelada.');
        } else {
          assistantMessage.pending = false;
          assistantMessage.content = 'Error: ' + error.message;
          assistantMessage.parts = [{ text: assistantMessage.content }];
          touchChat(chat);
          setComposerStatus('Hubo un error.');
          showToast('Error de Gemini', error.message);
        }
      } finally {
        appState.busy = false;
        appState.activeController = null;
        saveState();
        updateSendUi();
        renderHistory();
        renderThread();
      }
    }

    function boot() {
      loadState();
      elements.composer.placeholder = 'Escribe aquÃ­...';
      updateConfigUi();
      updateAuthUi();
      renderHistory();
      renderThread();
      autoResizeComposer();
      renderComposerAttachments();
      updateSendUi();
      bindEvents();
      setComposerStatus('');
      elements.composer.placeholder = 'Escribe aqui...';

      if (location.protocol === 'file:') {
        elements.composer.placeholder = 'Escribe aqui...';
        showToast('Atencion', 'Sirve este HTML por http://localhost para que Google OAuth funcione correctamente.');
        return;
      }

      if (appState.accessToken) {
        window.setTimeout(() => {
          bootstrapRestoredSession();
        }, 0);
        return;
      }

      window.setTimeout(() => {
        tryAutoRestoreGoogleSession();
      }, 0);
    }

    boot();
  </script>
