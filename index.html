<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>inhouse learn</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-primary: #f5f5f0;
      --bg-secondary: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --accent-orange: #E07A3C;
      --accent-blue: #002fd9;
      --line: rgba(0, 0, 0, 0.07);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --header-h: 64px;
    }

    body {
      overflow: hidden;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    button, input, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; background: none; color: inherit; }
    .hidden { display: none !important; }

    /* ── TOPBAR ──────────────────────────────── */
    .drive-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      height: var(--header-h);
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--line);
    }

    .drive-brand {
      font-family: 'Comfortaa', cursive;
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-primary);
    }

    .drive-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .topbar-models {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
    }

    .topbar-models .status-pill {
      flex-shrink: 0;
      margin-left: 2px;
    }

    .topbar-select {
      width: auto;
      min-width: 150px;
      max-width: 220px;
      min-height: 38px;
      flex-shrink: 1;
    }

    .topbar-models .field-note {
      display: none;
    }

    .engine-chip {
      padding: 5px 12px;
      border-radius: 999px;
      background: rgba(0, 47, 217, 0.07);
      color: var(--accent-blue);
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 16px;
      height: 38px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .btn:hover { opacity: 0.78; }
    .btn-primary { background: var(--text-primary); color: white; }
    .btn-secondary { background: rgba(0, 0, 0, 0.06); color: var(--text-primary); }
    .btn-ghost { background: transparent; color: var(--text-secondary); padding: 0 10px; font-weight: 500; font-size: 0.82rem; }
    .btn-ghost:hover { opacity: 1; color: var(--text-primary); }

    .btn-icon {
      width: 38px;
      height: 38px;
      padding: 0;
      border-radius: var(--radius-md);
      background: rgba(0,0,0,0.05);
      color: var(--text-secondary);
    }

    .profile-avatar-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.07);
      border: 1px solid var(--line);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }

    .avatar-mini {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    /* ── LAYOUT ──────────────────────────────── */
    #app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding-top: var(--header-h);
    }

    .app-body {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 268px minmax(0, 1fr);
    }

    /* ── SIDEBAR ─────────────────────────────── */
    .sidebar {
      background: var(--bg-secondary);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sidebar-account {
      margin-top: auto;
      border-bottom: none;
    }

    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-secondary);
    }

    .history-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 12px 14px;
      gap: 6px;
      overflow: hidden;
    }

    .chat-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .chat-list::-webkit-scrollbar { width: 4px; }
    .chat-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 999px; }

    .chat-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: stretch;
    }

    .chat-item {
      text-align: left;
      border-radius: var(--radius-md);
      padding: 9px 11px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.13s;
    }

    .chat-item:hover { background: rgba(0,0,0,0.04); }
    .chat-item.active {
      background: rgba(224, 122, 60, 0.08);
      border-color: rgba(224, 122, 60, 0.18);
    }

    .chat-item-title {
      font-weight: 600;
      font-size: 0.84rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item-meta {
      font-size: 0.72rem;
      color: var(--text-secondary);
    }

    .chat-delete {
      width: 34px;
      min-width: 34px;
      height: 34px;
      align-self: center;
      border-radius: 10px;
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.96);
      transition: opacity 0.14s, transform 0.14s, background 0.14s, color 0.14s;
    }

    .chat-delete svg {
      width: 15px;
      height: 15px;
    }

    .chat-delete:hover {
      background: rgba(0,0,0,0.05);
      color: var(--text-primary);
    }

    .chat-row:hover .chat-delete,
    .chat-row:focus-within .chat-delete {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 11px;
      border-radius: 999px;
      background: rgba(0,0,0,0.05);
      font-size: 0.8rem;
      font-weight: 600;
      width: fit-content;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent-orange);
      box-shadow: 0 0 0 3px rgba(224, 122, 60, 0.15);
      flex-shrink: 0;
    }

    .control-stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 6px;
    }

    .chat-select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(0,0,0,0.03);
      color: var(--text-primary);
      padding: 0 12px;
      outline: none;
    }

    .chat-select:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .field-note {
      font-size: 0.74rem;
      color: var(--text-secondary);
      line-height: 1.35;
    }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 10px;
      border-radius: var(--radius-md);
      background: rgba(0,0,0,0.03);
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      object-fit: cover;
      background: rgba(224, 122, 60, 0.12);
      flex-shrink: 0;
    }

    .profile-name { font-weight: 700; font-size: 0.85rem; }
    .profile-email { font-size: 0.73rem; color: var(--text-secondary); overflow-wrap: anywhere; }

    .auth-actions {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    /* ── CHAT MAIN ────────────────────────────── */
    .chat-main {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      background: var(--bg-primary);
      overflow: hidden;
    }

    .thread-wrap {
      overflow-y: auto;
      padding: 32px 28px;
      display: flex;
      justify-content: center;
    }

    .thread-wrap::-webkit-scrollbar { width: 6px; }
    .thread-wrap::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 999px; }

    .thread {
      width: min(740px, 100%);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── HERO ─────────────────────────────────── */
    .hero {
      padding: 44px 0 64px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .hero-brand {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .logo-lockup {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: rgba(224, 122, 60, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-kicker {
      font-size: 0.76rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
    }

    .hero h2 {
      font-family: 'Comfortaa', cursive;
      font-size: clamp(1.6rem, 3.5vw, 2.5rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      max-width: 18ch;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .chip {
      padding: 10px 14px;
      border-radius: var(--radius-md);
      background: var(--bg-secondary);
      border: 1px solid var(--line);
      font-size: 0.83rem;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: box-shadow 0.14s, border-color 0.14s;
    }

    .chip:hover {
      box-shadow: var(--shadow-sm);
      border-color: rgba(224, 122, 60, 0.28);
    }

    /* ── MESSAGES ─────────────────────────────── */
    .message {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .message-badge {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.76rem;
      flex-shrink: 0;
      overflow: hidden;
    }

    .message-badge img,
    .message-badge svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .message-badge img {
      object-fit: cover;
    }

    .message-badge.user {
      background: rgba(0, 47, 217, 0.07);
      color: var(--accent-blue);
      border-color: rgba(0, 47, 217, 0.1);
    }

    .message-badge.assistant {
      background: rgba(224, 122, 60, 0.08);
      color: var(--accent-orange);
      border-color: rgba(224, 122, 60, 0.15);
    }

    .message-meta {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 7px;
    }

    .bubble {
      background: var(--bg-secondary);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 15px 18px;
      line-height: 1.65;
      font-size: 0.93rem;
      overflow-wrap: anywhere;
    }

    .bubble h1, .bubble h2, .bubble h3 { margin: 0 0 10px; line-height: 1.2; }
    .bubble p + p, .bubble ul + p, .bubble ol + p, .bubble pre + p, .bubble .katex-display + p { margin-top: 10px; }
    .bubble ul, .bubble ol { margin: 10px 0 0 20px; }
    .bubble li + li { margin-top: 5px; }
    .bubble strong { font-weight: 700; }
    .bubble em { font-style: italic; }
    .bubble blockquote {
      margin: 10px 0 0;
      padding-left: 12px;
      border-left: 3px solid rgba(224, 122, 60, 0.35);
      color: var(--text-secondary);
    }

    .bubble pre {
      margin-top: 10px;
      padding: 13px;
      border-radius: var(--radius-md);
      background: #1a1a1a;
      color: #f4f0e8;
      overflow: auto;
      font-size: 0.85rem;
    }

    .bubble code { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
    .bubble :not(pre) > code {
      padding: 1px 6px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.05);
    }
    .bubble .katex-display {
      margin: 12px 0;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .attachment-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .attachment-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      max-width: 100%;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.04);
      border: 1px solid var(--line);
      font-size: 0.78rem;
      line-height: 1.2;
    }

    .attachment-pill svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .attachment-pill-text {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    /* ── TYPING ───────────────────────────────── */
    .typing { display: inline-flex; align-items: center; gap: 6px; }
    .typing span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(224, 122, 60, 0.5);
      animation: blink 1s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes blink {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
      40% { transform: translateY(-4px); opacity: 1; }
    }

    /* ── COMPOSER ─────────────────────────────── */
    .composer-area {
      padding: 14px 28px 20px;
      background: var(--bg-primary);
      border-top: 1px solid var(--line);
    }

    .composer-shell {
      max-width: 740px;
      margin: 0 auto;
      background: var(--bg-secondary);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 11px;
      box-shadow: var(--shadow-sm);
    }

    .composer-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .attach-btn {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-md);
      background: rgba(0, 0, 0, 0.05);
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .attach-btn:hover {
      background: rgba(0, 0, 0, 0.08);
      color: var(--text-primary);
    }

    .attach-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .composer-attachments {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 0;
      flex: 1;
    }

    .composer-attachment {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      max-width: 100%;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(0, 47, 217, 0.06);
      border: 1px solid rgba(0, 47, 217, 0.12);
      color: var(--text-primary);
      font-size: 0.78rem;
    }

    .composer-attachment-name {
      max-width: 260px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .composer-attachment button {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }

    .composer-attachment button:hover {
      background: rgba(0, 0, 0, 0.06);
      color: var(--text-primary);
    }

    .composer-frame {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 9px;
      align-items: end;
    }

    .composer {
      width: 100%;
      min-height: 52px;
      max-height: 200px;
      padding: 13px 14px;
      resize: none;
      border: 0;
      outline: none;
      background: transparent;
      border-radius: var(--radius-md);
      line-height: 1.5;
      color: var(--text-primary);
      font-size: 0.93rem;
    }

    .composer::placeholder { color: var(--text-secondary); }

    .send-btn {
      width: 52px;
      height: 52px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--text-primary);
      color: white;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    .send-btn[disabled] { opacity: 0.28; cursor: not-allowed; }

    .composer-meta {
      color: var(--text-secondary);
      font-size: 0.74rem;
      margin-top: 6px;
      padding: 0 3px;
    }

    /* ── TOAST ────────────────────────────────── */
    .toast-wrap {
      position: fixed;
      right: 18px; bottom: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 200;
    }

    .toast {
      min-width: 230px; max-width: 330px;
      padding: 12px 15px;
      border-radius: var(--radius-lg);
      background: var(--text-primary);
      color: #fff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.14);
      line-height: 1.4;
    }

    .toast strong { display: block; margin-bottom: 2px; font-size: 0.88rem; }

    /* ── RESPONSIVE ───────────────────────────── */
    @media (max-width: 860px) {
      .app-body { grid-template-columns: 1fr; }
      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--line);
        flex-direction: row;
        flex-wrap: nowrap;
        overflow-x: auto;
        max-height: none;
        min-height: 0;
      }
      .history-section { min-width: 200px; }
      .sidebar-section { min-width: 180px; }
      .thread-wrap { padding: 20px 16px; }
      .composer-area { padding: 12px 16px 16px; }
      .topbar-models .status-pill { display: none; }
      .topbar-select { min-width: 124px; max-width: 180px; }
    }

    @media (max-width: 560px) {
      .drive-topbar { padding: 0 14px; }
      .engine-chip { display: none; }
      .topbar-models { gap: 6px; }
      .topbar-select { min-width: 0; max-width: 120px; }
      .composer-frame { grid-template-columns: 1fr; }
      .send-btn { width: 100%; height: 46px; }
    }
  </style>
</head>
<body>
  <div id="app-container">

    <!-- TOPBAR -->
    <header class="drive-topbar">
      <div class="drive-brand">
        <svg viewBox="0 0 40 24" width="30" height="18" fill="none">
          <path d="M4 22 L20 6 L36 22" stroke="#E07A3C" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        inhouse learn
      </div>
      <div class="topbar-models">
        <div class="engine-chip" id="model-badge">gemini</div>
        <div class="status-pill">
          <span class="status-dot"></span>
          <span id="transport-label">Sin configurar</span>
        </div>
        <select id="chat-model-select" class="chat-select topbar-select" aria-label="Modelo del chat"></select>
        <select id="chat-thinking-select" class="chat-select topbar-select hidden" aria-label="Thinking del chat"></select>
        <div class="field-note" id="model-copy"></div>
      </div>
      <div class="drive-actions">
        <button class="btn btn-primary" id="new-chat-btn">Nuevo chat</button>
        <button class="btn btn-icon" id="clear-chat-btn" title="Limpiar chat actual">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
        <button class="btn btn-secondary" id="login-btn">Entrar con Google</button>
        <button class="profile-avatar-btn hidden" id="logout-btn" title="Cerrar sesión">
          <img class="avatar-mini" id="profile-avatar" alt="Avatar">
        </button>
      </div>
    </header>

    <div class="app-body">

      <!-- SIDEBAR -->
      <aside class="sidebar">

        <!-- Conversations -->
        <div class="history-section">
          <div class="section-label">Conversaciones</div>
          <div class="chat-list" id="chat-list"></div>
        </div>

        <!-- Cuenta -->
        <div class="sidebar-section sidebar-account">

    function uid(prefix) {
      return prefix + '-' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatWhen(value) {
      try {
        return new Intl.DateTimeFormat('es-ES', {
          dateStyle: 'short',
          timeStyle: 'short'
        }).format(new Date(value));
      } catch (error) {
        return value;
      }
    }

    function isConfigured(value) {
      return !!value && !String(value).includes('YOUR_') && !String(value).includes('PASTE_');
    }

    function inferredGoogleProject() {
      const match = String(APP_CONFIG.GOOGLE_CLIENT_ID || '').match(/^(\d+)-/);
      return match ? match[1] : '';
    }

    function googleProjectRef() {
      if (isConfigured(APP_CONFIG.GOOGLE_CLOUD_PROJECT)) {
        return String(APP_CONFIG.GOOGLE_CLOUD_PROJECT).trim();
      }
      return inferredGoogleProject();
    }

    function hasOauthConfig() {
      return isConfigured(APP_CONFIG.GOOGLE_CLIENT_ID) && !!googleProjectRef();
    }

    function getModelOption(modelId) {
      return MODEL_OPTIONS.find((option) => option.id === modelId) || MODEL_OPTIONS.find((option) => option.id === APP_CONFIG.GEMINI_MODEL) || MODEL_OPTIONS[0];
    }

    function normalizeModelId(modelId) {
      return getModelOption(modelId).id;
    }

    function defaultThinkingLevelForModel(modelId) {
      return getModelOption(modelId).defaultThinkingLevel || '';
    }

    function normalizeThinkingLevelForModel(modelId, thinkingLevel) {
      const option = getModelOption(modelId);
      const allowedLevels = option.thinkingLevels || [];
      if (!allowedLevels.length) {
        return '';
      }
      const rawLevel = String(thinkingLevel || '').trim().toLowerCase();
      if (allowedLevels.includes(rawLevel)) {
        return rawLevel;
      }
      return defaultThinkingLevelForModel(option.id);
    }

    function normalizeChatConfig(chat) {
      if (!chat || typeof chat !== 'object') {
        return chat;
      }
      chat.model = normalizeModelId(chat.model || APP_CONFIG.GEMINI_MODEL);
      chat.thinkingLevel = normalizeThinkingLevelForModel(chat.model, chat.thinkingLevel || APP_CONFIG.GEMINI_THINKING_LEVEL);
      return chat;
    }

    function normalizeStoredMessage(message) {
      const content = message && typeof message.content === 'string'
        ? message.content
        : '';
      const attachments = Array.isArray(message && message.attachments)
        ? message.attachments.map((item) => serializeAttachmentForStorage(item)).filter(Boolean)
        : [];
      const parts = Array.isArray(message && message.parts)
        ? message.parts.map((part) => serializePartForStorage(part, attachments)).filter(Boolean)
        : (content ? [{ text: content }] : []);
      return {
        id: message && typeof message.id === 'string' ? message.id : uid('msg'),
        role: message && message.role === 'assistant' ? 'assistant' : 'user',
        content,
        parts,
        attachments,
        pending: !!(message && message.pending),
        createdAt: message && typeof message.createdAt === 'string' ? message.createdAt : nowIso()
      };
    }

    function normalizeStoredChat(chat) {
      const createdAt = chat && typeof chat.createdAt === 'string'
        ? chat.createdAt
        : nowIso();
      return normalizeChatConfig({
        id: chat && typeof chat.id === 'string' ? chat.id : uid('chat'),
        title: chat && typeof chat.title === 'string' && chat.title.trim() ? chat.title : 'Nuevo chat',
        createdAt,
        updatedAt: chat && typeof chat.updatedAt === 'string' ? chat.updatedAt : createdAt,
        messages: Array.isArray(chat && chat.messages)
          ? chat.messages.map((message) => normalizeStoredMessage(message))
          : [],
        model: chat && chat.model ? chat.model : APP_CONFIG.GEMINI_MODEL,
        thinkingLevel: chat && typeof chat.thinkingLevel !== 'undefined'
          ? chat.thinkingLevel
          : APP_CONFIG.GEMINI_THINKING_LEVEL
      });
    }

    function normalizeSnapshot(snapshot) {
      if (!snapshot || !Array.isArray(snapshot.chats) || !snapshot.chats.length) {
        return null;
      }
      const chats = snapshot.chats.map((chat) => normalizeStoredChat(chat));
      return {
        version: typeof snapshot.version === 'number' ? snapshot.version : 1,
        savedAt: typeof snapshot.savedAt === 'string' ? snapshot.savedAt : nowIso(),
        activeChatId: typeof snapshot.activeChatId === 'string' ? snapshot.activeChatId : chats[0].id,
        chats
      };
    }

    function buildStateSnapshot() {
      return {
        version: 1,
        savedAt: nowIso(),
        activeChatId: appState.activeChatId,
        chats: appState.chats.map((chat) => {
          const normalizedChat = normalizeStoredChat(chat);
          normalizedChat.messages = normalizedChat.messages.filter((message) => !message.pending);
          return normalizedChat;
        })
      };
    }

    function applySnapshotToState(snapshot) {
      const normalized = normalizeSnapshot(snapshot);
      if (!normalized) {
        return false;
      }
      appState.chats = normalized.chats;
      appState.activeChatId = normalized.activeChatId;
      ensureActiveChat();
      saveState({
        skipDrive: true
      });
      return true;
    }

    function messageHasVisibleContent(message) {
      if (!message || message.pending) {
        return false;
      }
      if (typeof message.content === 'string' && message.content.trim()) {
        return true;
      }
      return Array.isArray(message.parts) && message.parts.some((part) => {
        return part && typeof part.text === 'string' && part.text.trim() && !part.thought;
      });
    }

    function chatHasMeaningfulContent(chat) {
      return !!(chat && Array.isArray(chat.messages) && chat.messages.some((message) => messageHasVisibleContent(message)));
    }

    function snapshotHasMeaningfulContent(snapshot) {
      return !!(snapshot && Array.isArray(snapshot.chats) && snapshot.chats.some((chat) => chatHasMeaningfulContent(chat)));
    }

    function parseSnapshotMoment(value) {
      const timestamp = Date.parse(value || '');
      return Number.isFinite(timestamp) ? timestamp : 0;
    }

    function snapshotFreshness(snapshot) {
      if (!snapshot || !Array.isArray(snapshot.chats)) {
        return 0;
      }
      let newest = 0;
      snapshot.chats.forEach((chat) => {
        if (!chatHasMeaningfulContent(chat)) {
          return;
        }
        newest = Math.max(newest, parseSnapshotMoment(chat.updatedAt), parseSnapshotMoment(chat.createdAt));
        (chat.messages || []).forEach((message) => {
          newest = Math.max(newest, parseSnapshotMoment(message.createdAt));
        });
      });
      return newest;
    }

    function resetDriveState() {
      if (appState.driveSyncTimer) {
        window.clearTimeout(appState.driveSyncTimer);
      }
      appState.driveFolderId = '';
      appState.driveSnapshotFileId = '';
      appState.driveReady = false;
      appState.driveSyncTimer = 0;
      appState.driveSyncPromise = null;
      appState.driveSyncQueued = false;
    }

    function fileExtension(name) {
      const match = String(name || '').toLowerCase().match(/\.([a-z0-9]+)$/);
      return match ? match[1] : '';
    }

    function inferMimeType(file) {
      if (file && file.type) {
        return file.type;
      }
      return EXTENSION_MIME_TYPES[fileExtension(file && file.name)] || 'application/octet-stream';
    }

    function formatBytes(value) {
      const bytes = Number(value || 0);
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function truncateText(value, maxChars) {
      const limit = maxChars || MAX_TEXT_ATTACHMENT_CHARS;
      const text = String(value || '').replace(/\u0000/g, '').trim();
      if (!text) {
        return '';
      }
      if (text.length <= limit) {
        return text;
      }
      return text.slice(0, limit) + '\n\n[Contenido truncado]';
    }

    function attachmentKindFromMime(mimeType, name) {
      const mime = String(mimeType || '').toLowerCase();
      const ext = fileExtension(name);
      if (mime === 'application/pdf' || ext === 'pdf') return 'pdf';
      if (mime.startsWith('image/')) return 'image';
      if (mime.startsWith('audio/')) return 'audio';
      if (mime.startsWith('video/')) return 'video';
      if (ext === 'docx' || ext === 'odt') return 'doc';
      if (ext === 'xlsx' || ext === 'xls' || ext === 'ods' || ext === 'csv' || ext === 'tsv') return 'sheet';
      if (mime.startsWith('text/') || mime.includes('json') || mime.includes('xml') || mime.includes('javascript') || mime.includes('typescript') || mime.includes('yaml') || ext === 'md' || ext === 'log') return 'text';
      return 'binary';
    }

    function attachmentIconMarkup(kind) {
      const color = kind === 'image'
        ? '#0f766e'
        : kind === 'audio'
          ? '#7c3aed'
          : kind === 'video'
            ? '#1d4ed8'
            : kind === 'sheet'
              ? '#15803d'
              : '#E07A3C';
      return [
        '<svg viewBox="0 0 24 24" fill="none" stroke="' + color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">',
        '  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>',
        '  <polyline points="14 2 14 8 20 8"></polyline>',
        '</svg>'
      ].join('');
    }

    function attachmentBadgeMarkup(attachment, removable) {
      const item = attachment || {};
      const sizeLabel = item.size ? ' · ' + formatBytes(item.size) : '';
      const close = removable
        ? '<button type="button" data-remove-attachment-id="' + escapeHtml(item.id) + '" aria-label="Quitar archivo">×</button>'
        : '';
      return [
        '<div class="' + (removable ? 'composer-attachment' : 'attachment-pill') + '">',
        attachmentIconMarkup(item.kind),
        '<span class="' + (removable ? 'composer-attachment-name' : 'attachment-pill-text') + '">' + escapeHtml((item.name || 'Archivo') + sizeLabel) + '</span>',
        close,
        '</div>'
      ].join('');
    }

    function renderComposerAttachments() {
      if (!elements.composerAttachments) {
        return;
      }
      const items = appState.composerAttachments || [];
      elements.composerAttachments.classList.toggle('hidden', !items.length);
      elements.composerAttachments.innerHTML = items.map((item) => attachmentBadgeMarkup(item, true)).join('');
      Array.from(elements.composerAttachments.querySelectorAll('[data-remove-attachment-id]')).forEach((button) => {
        button.addEventListener('click', () => {
          appState.composerAttachments = appState.composerAttachments.filter((item) => item.id !== button.dataset.removeAttachmentId);
          renderComposerAttachments();
          updateSendUi();
        });
      });
    }

    function resetComposerAttachments() {
      appState.composerAttachments = [];
      if (elements.fileInput) {
        elements.fileInput.value = '';
      }
      renderComposerAttachments();
    }

    function arrayBufferToBase64(buffer) {
      let binary = '';
      const bytes = new Uint8Array(buffer);
      const chunkSize = 0x8000;
      for (let index = 0; index < bytes.length; index += chunkSize) {
        const chunk = bytes.subarray(index, index + chunkSize);
        binary += String.fromCharCode.apply(null, chunk);
      }
      return btoa(binary);
    }

    async function readPdfAsText(file) {
      if (!(window.pdfjsLib && window.pdfjsLib.getDocument)) {
        throw new Error('pdf.js no esta cargado.');
      }
      if (window.pdfjsLib.GlobalWorkerOptions && !window.pdfjsLib.GlobalWorkerOptions.workerSrc) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.min.js';
      }
      const buffer = await file.arrayBuffer();
      const pdf = await window.pdfjsLib.getDocument({ data: buffer }).promise;
      const parts = [];
      const maxPages = Math.min(pdf.numPages, MAX_PDF_PAGES);
      for (let pageNumber = 1; pageNumber <= maxPages; pageNumber += 1) {
        const page = await pdf.getPage(pageNumber);
        const content = await page.getTextContent();
        const text = content.items.map((item) => item && item.str ? item.str : '').join(' ').replace(/\s+/g, ' ').trim();
        if (text) {
          parts.push('[Pagina ' + pageNumber + ']\n' + text);
        }
      }
      return truncateText(parts.join('\n\n'), MAX_TEXT_ATTACHMENT_CHARS);
    }

    async function readDocxAsText(file) {
      if (!(window.mammoth && window.mammoth.extractRawText)) {
        throw new Error('Mammoth no esta cargado.');
      }
      const result = await window.mammoth.extractRawText({
        arrayBuffer: await file.arrayBuffer()
      });
      return truncateText(result && result.value ? result.value : '', MAX_TEXT_ATTACHMENT_CHARS);
    }

    async function readSpreadsheetAsText(file) {
      if (!(window.XLSX && window.XLSX.read)) {
        throw new Error('SheetJS no esta cargado.');
      }
      const workbook = window.XLSX.read(await file.arrayBuffer(), {
        type: 'array'
      });
      const chunks = [];
      workbook.SheetNames.forEach((sheetName) => {
        const worksheet = workbook.Sheets[sheetName];
        const csv = window.XLSX.utils.sheet_to_csv(worksheet, {
          blankrows: false
        }).trim();
        if (csv) {
          chunks.push('[Hoja: ' + sheetName + ']\n' + csv);
        }
      });
      return truncateText(chunks.join('\n\n'), MAX_TEXT_ATTACHMENT_CHARS);
    }

    async function buildInlineAttachment(file, mimeType, kind) {
      if (file.size > MAX_INLINE_ATTACHMENT_BYTES) {
        throw new Error('"' + file.name + '" pesa ' + formatBytes(file.size) + '. Para adjuntos binarios el limite actual es ' + formatBytes(MAX_INLINE_ATTACHMENT_BYTES) + '.');
      }
      return {
        id: uid('att'),
        name: file.name,
        size: file.size,
        mimeType,
        kind,
        source: 'inline',
        part: {
          inlineData: {
            mimeType,
            data: arrayBufferToBase64(await file.arrayBuffer())
          }
        }
      };
    }

    function buildTextAttachment(file, mimeType, kind, text) {
      const trimmed = truncateText(text, MAX_TEXT_ATTACHMENT_CHARS);
      if (!trimmed) {
        throw new Error('No pude extraer texto util de "' + file.name + '".');
      }
      return {
        id: uid('att'),
        name: file.name,
        size: file.size,
        mimeType,
        kind,
        source: 'text',
        extractedText: trimmed,
        part: {
          text: [
            'Archivo adjunto: ' + file.name,
            'Tipo: ' + mimeType,
            '',
            trimmed
          ].join('\n')
        }
      };
    }

    async function prepareAttachment(file) {
      const mimeType = inferMimeType(file);
      const kind = attachmentKindFromMime(mimeType, file.name);

      if (kind === 'pdf') {
        try {
          return await buildInlineAttachment(file, mimeType, kind);
        } catch (error) {
          const text = await readPdfAsText(file);
          return buildTextAttachment(file, mimeType, kind, text);
        }
      }
      if (kind === 'doc') {
        return buildTextAttachment(file, mimeType, kind, await readDocxAsText(file));
      }
      if (kind === 'sheet') {
        if (fileExtension(file.name) === 'csv' || fileExtension(file.name) === 'tsv') {
          return buildTextAttachment(file, mimeType, kind, await file.text());
        }
        return buildTextAttachment(file, mimeType, kind, await readSpreadsheetAsText(file));
      }
      if (kind === 'text') {
        return buildTextAttachment(file, mimeType, kind, await file.text());
      }
      return buildInlineAttachment(file, mimeType, kind);
    }

    async function addFilesToComposer(fileList) {
      const files = Array.from(fileList || []);
      if (!files.length) {
        return;
      }
      appState.attachmentBusy = true;
      updateSendUi();
      setComposerStatus('Procesando adjuntos...');
      try {
        for (const file of files) {
          const attachment = await prepareAttachment(file);
          appState.composerAttachments.push(attachment);
        }
        renderComposerAttachments();
        if (!appState.busy) {
          setComposerStatus('');
        }
      } catch (error) {
        showToast('Adjuntos', error.message);
        setComposerStatus('No se pudo adjuntar uno de los archivos.');
      } finally {
        appState.attachmentBusy = false;
        updateSendUi();
        if (!appState.busy) {
          window.setTimeout(() => {
            if (!appState.busy) {
              setComposerStatus('');

          }, 1200);

      }

    function serializeAttachmentForStorage(attachment) {
      if (!attachment || typeof attachment !== 'object') {
        return null;
      }
      return {
        id: typeof attachment.id === 'string' ? attachment.id : uid('att'),
        name: typeof attachment.name === 'string' ? attachment.name : 'Archivo',
        size: Number(attachment.size || 0),
        mimeType: typeof attachment.mimeType === 'string' ? attachment.mimeType : 'application/octet-stream',
        kind: typeof attachment.kind === 'string' ? attachment.kind : 'binary',
        source: typeof attachment.source === 'string' ? attachment.source : 'text'
      };
    }

    function serializePartForStorage(part, attachmentList) {
      if (!part || typeof part !== 'object') {
        return null;
      }
      if (typeof part.text === 'string') {
        return {
          text: part.text
        };
      }
      if (part.inlineData && part.inlineData.mimeType) {
        const match = (attachmentList || []).find((item) => item.mimeType === part.inlineData.mimeType);
        return {
          text: '[Adjunto binario: ' + (match ? match.name : part.inlineData.mimeType) + ']'
        };
      }
      return null;
    }

    function rememberManualLogout() {
      localStorage.setItem(AUTH_SKIP_RESTORE_KEY, '1');

    function clearManualLogoutFlag() {

    function shouldAutoRestoreAuth() {

          const names = firstAttachmentMessage.attachments.map((item) => item.name).filter(Boolean);
          if (names.length) {
            return names.length === 1 ? names[0] : names[0] + ' +' + (names.length - 1);
          }

        return 'Nuevo chat';

      const flat = firstUser.content.replace(/\s+/g, ' ').trim();

    function renderInline(text) {
      return escapeHtml(text)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    }

    function fallbackRenderMarkdown(text) {
      const fences = [];
      let html = escapeHtml(text).replace(/```([\s\S]*?)```/g, function(match, code) {
        const token = '__CODE_BLOCK_' + fences.length + '__';
        fences.push('<pre><code>' + code.trim() + '</code></pre>');
        return token;
      });

      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

      const blocks = html.split(/\n\s*\n/).map((block) => block.trim()).filter(Boolean);
      const rendered = blocks.map((block) => {
        const lines = block.split('\n');
        if (lines.every((line) => /^[-*] /.test(line))) {
          return '<ul>' + lines.map((line) => '<li>' + renderInline(line.replace(/^[-*] /, '')) + '</li>').join('') + '</ul>';
        }
        if (lines.every((line) => /^\d+\. /.test(line))) {
          return '<ol>' + lines.map((line) => '<li>' + renderInline(line.replace(/^\d+\. /, '')) + '</li>').join('') + '</ol>';
        }
        if (/^<h[1-3]>/.test(block) || /^<pre>/.test(block) || /^<ul>/.test(block) || /^<ol>/.test(block)) {
          return block;
        }
        return '<p>' + renderInline(block).replace(/\n/g, '<br>') + '</p>';
      }).join('');

      return fences.reduce((acc, code, index) => acc.replace('__CODE_BLOCK_' + index + '__', code), rendered);
    }

    function renderMarkdown(text) {
      if (!text) {
        return '';
      }

      if (!(window.marked && window.DOMPurify)) {
        return fallbackRenderMarkdown(text);
      }

      const rawHtml = window.marked.parse(text, {
        gfm: true,
        breaks: true
      });

      return window.DOMPurify.sanitize(rawHtml);
    }

    function enhanceRichContent(root) {
      if (!root) {
        return;
      }

      Array.from(root.querySelectorAll('a[href]')).forEach((link) => {
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
      });

      if (!window.renderMathInElement) {
        return;
      }

      window.renderMathInElement(root, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '\\[', right: '\\]', display: true },
          { left: '\\(', right: '\\)', display: false },
          { left: '$', right: '$', display: false }
        ],
        throwOnError: false,
        ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      });
    }

    async function waitForGoogle() {
      const start = Date.now();
      while (!(window.google && google.accounts && google.accounts.oauth2)) {
        if (Date.now() - start > 10000) {
          throw new Error('Google Identity Services no cargo a tiempo.');
        }
        await new Promise((resolve) => window.setTimeout(resolve, 120));
      }
    }

    async function fetchProfile(accessToken) {
      const response = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
        headers: {
          Authorization: 'Bearer ' + accessToken
        }
      });
      if (!response.ok) {
        throw new Error('No se pudo leer el perfil de Google.');
      }
      return response.json();
    }

    function escapeDriveQueryValue(value) {
      return String(value || '')
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'");
    }

    async function driveFetch(url, options, allowRetry) {
      if (!appState.accessToken) {
        throw new Error('Inicia sesion con Google para sincronizar con Drive.');
      }

      const requestOptions = Object.assign({}, options);
      const headers = new Headers(requestOptions.headers || {});
      headers.set('Authorization', 'Bearer ' + appState.accessToken);
      requestOptions.headers = headers;

      const response = await fetch(url, requestOptions);
      if (response.status === 401 && allowRetry !== false) {
        await loginWithGoogle({
          interactive: false,
          toast: false,
          skipDriveBootstrap: true
        });
        return driveFetch(url, options, false);
      }
      return response;
    }

    function extractDriveErrorMessage(payload, fallback, status) {
      if (payload && payload.error && payload.error.message) {
        return payload.error.message;
      }
      return fallback + ' (HTTP ' + status + ')';
    }

    async function driveFetchJson(url, options, allowRetry, fallbackMessage) {
      const response = await driveFetch(url, options, allowRetry);
      const payload = await response.json().catch(() => null);
      if (!response.ok) {
        throw new Error(extractDriveErrorMessage(payload, fallbackMessage || 'Error de Drive', response.status));
      }
      return payload;
    }

    async function driveFetchText(url, options, allowRetry, fallbackMessage) {
      const response = await driveFetch(url, options, allowRetry);
      const text = await response.text();
      if (!response.ok) {
        let payload = null;
        try {
          payload = text ? JSON.parse(text) : null;
        } catch (error) {}
        throw new Error(extractDriveErrorMessage(payload, fallbackMessage || 'Error de Drive', response.status));
      }
      return text;
    }

    async function listDriveFiles(query, pageSize) {
      const params = new URLSearchParams({
        q: query,
        spaces: 'drive',
        pageSize: String(pageSize || 10),
        fields: 'files(id,name,mimeType,modifiedTime,parents)'
      });
      const payload = await driveFetchJson(
        'https://www.googleapis.com/drive/v3/files?' + params.toString(),
        {
          method: 'GET'
        },
        true,
        'No se pudo listar Drive.'
      );
      return Array.isArray(payload && payload.files) ? payload.files : [];
    }

    async function findDriveFolderId() {
      if (appState.driveFolderId) {
        return appState.driveFolderId;
      }
      const taggedFolders = await listDriveFiles(
        "mimeType='application/vnd.google-apps.folder' and trashed=false and appProperties has { key='" + DRIVE_FOLDER_TAG + "' and value='1' }",
        5
      );
      const taggedFolder = taggedFolders[0];
      if (taggedFolder && taggedFolder.id) {
        appState.driveFolderId = taggedFolder.id;
        return appState.driveFolderId;
      }

      const namedFolders = await listDriveFiles(
        "mimeType='application/vnd.google-apps.folder' and trashed=false and name='" + escapeDriveQueryValue(DRIVE_FOLDER_NAME) + "'",
        5
      );
      const namedFolder = namedFolders[0];
      if (namedFolder && namedFolder.id) {
        appState.driveFolderId = namedFolder.id;
        return appState.driveFolderId;
      }
      return '';
    }

    async function ensureDriveFolderId() {
      const existingId = await findDriveFolderId();
      if (existingId) {
        return existingId;
      }
      const folder = await driveFetchJson(
        'https://www.googleapis.com/drive/v3/files?fields=id,name',
        {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            name: DRIVE_FOLDER_NAME,
            mimeType: 'application/vnd.google-apps.folder',
            appProperties: {
              [DRIVE_FOLDER_TAG]: '1'
            }
          })
        },
        true,
        'No se pudo crear la carpeta de Drive.'
      );
      appState.driveFolderId = folder.id || '';
      return appState.driveFolderId;
    }

    async function findDriveSnapshotFileId(folderId) {
      if (appState.driveSnapshotFileId) {
        return appState.driveSnapshotFileId;
      }
      if (!folderId) {
        return '';
      }
      const taggedFiles = await listDriveFiles(
        "'" + escapeDriveQueryValue(folderId) + "' in parents and trashed=false and appProperties has { key='" + DRIVE_SNAPSHOT_TAG + "' and value='1' }",
        5
      );
      const taggedFile = taggedFiles[0];
      if (taggedFile && taggedFile.id) {
        appState.driveSnapshotFileId = taggedFile.id;
        return appState.driveSnapshotFileId;
      }

      const namedFiles = await listDriveFiles(
        "'" + escapeDriveQueryValue(folderId) + "' in parents and trashed=false and name='" + escapeDriveQueryValue(DRIVE_SNAPSHOT_NAME) + "'",
        5
      );
      const namedFile = namedFiles[0];
      if (namedFile && namedFile.id) {
        appState.driveSnapshotFileId = namedFile.id;
        return appState.driveSnapshotFileId;
      }
      return '';
    }

    function buildDriveMultipartBody(metadata, content, mimeType) {
      const boundary = 'inhouse_drive_' + Math.random().toString(36).slice(2);
      const body = [
        '--' + boundary,
        'Content-Type: application/json; charset=UTF-8',
        '',
        JSON.stringify(metadata),
        '--' + boundary,
        'Content-Type: ' + (mimeType || 'application/json') + '; charset=UTF-8',
        '',
        content,
        '--' + boundary + '--',
        ''
      ].join('\r\n');
      return {
        body,
        contentType: 'multipart/related; boundary=' + boundary
      };
    }

    async function readDriveSnapshot() {
      const folderId = await findDriveFolderId();
      if (!folderId) {
        return null;
      }
      const fileId = await findDriveSnapshotFileId(folderId);
      if (!fileId) {
        return null;
      }
      const raw = await driveFetchText(
        'https://www.googleapis.com/drive/v3/files/' + encodeURIComponent(fileId) + '?alt=media',
        {
          method: 'GET'
        },
        true,
        'No se pudo descargar el historial de Drive.'
      );
      return normalizeSnapshot(JSON.parse(raw));
    }

    async function persistDriveSnapshot(snapshot) {
      if (!appState.accessToken) {
        return;
      }
      const normalizedSnapshot = normalizeSnapshot(snapshot) || buildStateSnapshot();
      const folderId = await ensureDriveFolderId();
      const existingFileId = await findDriveSnapshotFileId(folderId);
      const metadata = {
        name: DRIVE_SNAPSHOT_NAME,
        mimeType: 'application/json',
        description: 'inhouse learn chat snapshot',
        appProperties: {
          [DRIVE_SNAPSHOT_TAG]: '1'
        }
      };
      if (!existingFileId) {
        metadata.parents = [folderId];
      }

      const multipart = buildDriveMultipartBody(
        metadata,
        JSON.stringify(normalizedSnapshot, null, 2),
        'application/json'
      );
      const response = await driveFetchJson(
        existingFileId
          ? 'https://www.googleapis.com/upload/drive/v3/files/' + encodeURIComponent(existingFileId) + '?uploadType=multipart&fields=id,modifiedTime'
          : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,modifiedTime',
        {
          method: existingFileId ? 'PATCH' : 'POST',
          headers: {
            'Content-Type': multipart.contentType
          },
          body: multipart.body
        },
        true,
        'No se pudo guardar el historial en Drive.'
      );
      appState.driveFolderId = folderId;
      appState.driveSnapshotFileId = response && response.id ? response.id : existingFileId;
      appState.driveReady = true;
    }

    async function ensureDriveReady() {
      if (!appState.accessToken) {
        return;
      }
      if (appState.driveReady) {
        return;
      }

      const localSnapshot = buildStateSnapshot();
      const remoteSnapshot = await readDriveSnapshot();
      const localHasContent = snapshotHasMeaningfulContent(localSnapshot);
      const remoteHasContent = snapshotHasMeaningfulContent(remoteSnapshot);

      if (remoteHasContent && (!localHasContent || snapshotFreshness(remoteSnapshot) > snapshotFreshness(localSnapshot))) {
        applySnapshotToState(remoteSnapshot);
        appState.driveReady = true;
        return;
      }

      appState.driveReady = true;
      await persistDriveSnapshot(localSnapshot);
    }

    function scheduleDriveSync() {
      if (!appState.accessToken || !appState.driveReady) {
        return;
      }
      if (appState.driveSyncTimer) {
        window.clearTimeout(appState.driveSyncTimer);
      }
      appState.driveSyncTimer = window.setTimeout(() => {
        appState.driveSyncTimer = 0;
        if (appState.driveSyncPromise) {
          appState.driveSyncQueued = true;
          return;
        }
        appState.driveSyncPromise = persistDriveSnapshot(buildStateSnapshot())
          .catch((error) => {
            console.error('Drive sync error:', error);
            showToast('Drive', 'No se pudo guardar el chat en Drive. Revisa que Google Drive API este activada.');
          })
          .finally(() => {
            appState.driveSyncPromise = null;
            if (appState.driveSyncQueued) {
              appState.driveSyncQueued = false;
              scheduleDriveSync();
            }
          });
      }, DRIVE_SYNC_DEBOUNCE_MS);
    }

    async function loginWithGoogle() {
      await waitForGoogle();
      const scopes = [
        'https://www.googleapis.com/auth/userinfo.email',
        'https://www.googleapis.com/auth/userinfo.profile',
        'https://www.googleapis.com/auth/generative-language.retriever'
      ];

      const tokenResponse = await new Promise((resolve, reject) => {
        const tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: APP_CONFIG.GOOGLE_CLIENT_ID,
          scope: scopes.join(' '),
          callback: (response) => {
            if (response && response.access_token) {
              resolve(response);
              return;
            }
            reject(new Error('No se recibio access token.'));
          },
          error_callback: (error) => {
            reject(new Error(error && error.message ? error.message : 'OAuth cancelado.'));
          }
        });
        tokenClient.requestAccessToken({
          prompt: appState.accessToken ? '' : 'consent'
        });
      });

      appState.accessToken = tokenResponse.access_token;
      appState.profile = await fetchProfile(appState.accessToken);
      updateAuthUi();
      updateConfigUi();
      showToast('Sesion iniciada', 'La cuenta Google ya esta lista.');
    }

    function buildContents(messages) {
      return messages
        .filter((message) => {
          if (message.pending) {
            return false;
          }
          if (Array.isArray(message.parts) && message.parts.length) {
            return true;
          }
          return !!(message.content && message.content.trim());
        })
        .map((message) => ({
          role: message.role === 'assistant' ? 'model' : 'user',
          parts: Array.isArray(message.parts) && message.parts.length
            ? cloneParts(message.parts)
            : [{ text: message.content }]
        }));
    }

    function buildRequestBody(messages, chat) {
      const generationConfig = {
        temperature: APP_CONFIG.TEMPERATURE,
        topP: APP_CONFIG.TOP_P,
        maxOutputTokens: APP_CONFIG.MAX_OUTPUT_TOKENS
      };
      const thinkingLevel = currentThinkingLevel(chat);
      if (thinkingLevel) {
        generationConfig.thinkingConfig = {
          thinkingLevel
        };
      }

      return {
        systemInstruction: {
          parts: [{ text: APP_CONFIG.SYSTEM_PROMPT }]
        },
        contents: buildContents(messages),
        generationConfig
      };
    }

    function buildVertexEndpoint() {
      const location = APP_CONFIG.VERTEX_LOCATION || 'global';
      const root = location === 'global'
        ? 'https://aiplatform.googleapis.com/v1'
        : 'https://' + location + '-aiplatform.googleapis.com/v1';
      return root +
        '/projects/' + encodeURIComponent(APP_CONFIG.VERTEX_PROJECT_ID) +
        '/locations/' + encodeURIComponent(location) +
        '/publishers/google/models/' + encodeURIComponent(APP_CONFIG.VERTEX_MODEL) +
        ':generateContent';
    }

    function buildApiKeyEndpoint() {
      return 'https://generativelanguage.googleapis.com/v1beta/models/' +
        encodeURIComponent(APP_CONFIG.GEMINI_API_MODEL) +
        ':generateContent';
    }

    function extractTextFromResponse(data) {
      const parts = data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts;
      if (Array.isArray(parts)) {
        const text = extractVisibleTextFromParts(parts);
        if (text) {
          return text;
        }
      }
      if (data && data.promptFeedback && data.promptFeedback.blockReason) {
        return 'La respuesta fue bloqueada: ' + data.promptFeedback.blockReason;
      }
      return 'No llego texto util desde Gemini.';
    }

    function extractModelParts(data) {
      const parts = data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts;
      return Array.isArray(parts) ? cloneParts(parts) : [];
    }

    async function callGemini(messages, signal) {
      const body = buildRequestBody(messages);
      let endpoint = '';
      let headers = {
        'Content-Type': 'application/json'
      };

      if (appState.accessToken) {
        endpoint = buildApiKeyEndpoint();
        headers.Authorization = 'Bearer ' + appState.accessToken;
      } else if (hasApiKey()) {
        endpoint = buildApiKeyEndpoint();
        headers['x-goog-api-key'] = APP_CONFIG.GEMINI_API_KEY;
      } else {
        throw new Error('Inicia sesion con Google para usar Gemini.');
      }

      const response = await fetch(endpoint, {
        method: 'POST',
        headers,
        body: JSON.stringify(body),
        signal
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        const message = data && data.error && data.error.message
          ? data.error.message
          : 'Error HTTP ' + response.status;
        throw new Error(message);
      }
      return extractTextFromResponse(data);
    }

      chat.updatedAt = nowIso();

    function createMessage(role, content, pending, options) {
      const settings = Object.assign({
        parts: null,
        attachments: []
      }, options);
      return {
        id: uid('msg'),
        role,
        content: content || '',
        parts: Array.isArray(settings.parts)
          ? cloneParts(settings.parts)
          : (content ? [{ text: content }] : []),
        attachments: Array.isArray(settings.attachments)
          ? settings.attachments.map((item) => serializeAttachmentForStorage(item)).filter(Boolean)
          : [],
        pending: !!pending,
        createdAt: nowIso()
      };
    }

    function deleteChat(chatId) {
      const targetId = String(chatId || '');
      const targetChat = appState.chats.find((chat) => chat.id === targetId);
      if (!targetChat) {
        return;
      }

      const label = targetChat.title && targetChat.title !== 'Nuevo chat'
        ? '"' + targetChat.title + '"'
        : 'este chat';
      if (!window.confirm('Se eliminara ' + label + '. Continuar?')) {
        return;
      }

      if (appState.busy && appState.activeChatId === targetId && appState.activeController) {
        appState.activeController.abort();
      }

      appState.chats = appState.chats.filter((chat) => chat.id !== targetId);

      if (!appState.chats.length) {
        const chat = createChat();
        appState.chats.unshift(chat);
        appState.activeChatId = chat.id;
      } else if (appState.activeChatId === targetId) {
        appState.activeChatId = appState.chats[0].id;
      }

      saveState();
      updateConfigUi();
      renderHistory();
      renderThread();
      setComposerStatus('');
    }

    async function handleSend() {
      if (appState.busy) {
        if (appState.activeController) {
          appState.activeController.abort();
        }
        return;
      }

      const prompt = elements.composer.value.trim();
      if (!prompt) {
        return;
      }

      if (prefersVertex() && !appState.accessToken) {
        try {
          await loginWithGoogle();
        } catch (error) {
          showToast('OAuth', error.message);
          setComposerStatus('Falta iniciar sesion.');
          return;
        }
      }

      const chat = getActiveChat();
      const userMessage = createMessage('user', prompt, false);
      const assistantMessage = createMessage('assistant', '', true);

      chat.messages.push(userMessage, assistantMessage);
      touchChat(chat);
      elements.composer.value = '';
      autoResizeComposer();
      appState.busy = true;
      appState.activeController = new AbortController();
      setComposerStatus('Consultando ' + activeModelName() + '...');
      updateSendUi();
      renderHistory();
      renderThread();

      try {
        const reply = await callGemini(chat.messages, appState.activeController.signal);
        assistantMessage.pending = false;
        assistantMessage.content = reply;
        touchChat(chat);
        setComposerStatus('');
      } catch (error) {
        if (error.name === 'AbortError') {
          chat.messages = chat.messages.filter((message) => message.id !== assistantMessage.id);
          setComposerStatus('Solicitud cancelada.');
        } else {
          assistantMessage.pending = false;
          assistantMessage.content = 'Error: ' + error.message;
          touchChat(chat);
          setComposerStatus('Hubo un error.');
          showToast('Error de Gemini', error.message);
        }
      } finally {
        appState.busy = false;
        appState.activeController = null;
        saveState();
        updateSendUi();
        renderHistory();
        renderThread();
      }
    }

    async function requestGoogleAccessToken(promptMode) {
      ensureOauthConfig();
      await waitForGoogle();
      const scopes = [
        'https://www.googleapis.com/auth/userinfo.email',
        'https://www.googleapis.com/auth/userinfo.profile',
        'https://www.googleapis.com/auth/generative-language.retriever',
        'https://www.googleapis.com/auth/cloud-platform',
        DRIVE_SCOPE
      ];

      return new Promise((resolve, reject) => {
        const tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: APP_CONFIG.GOOGLE_CLIENT_ID,
          scope: scopes.join(' '),
          callback: (response) => {
            if (response && response.access_token) {
              resolve(response);
              return;
            }
            reject(new Error('No se recibio access token.'));
          },
          error_callback: (error) => {
            reject(new Error(error && error.message ? error.message : 'OAuth cancelado.'));
          }
        });
        tokenClient.requestAccessToken({
          prompt: promptMode
        });
      });
    }

      return 'https://generativelanguage.googleapis.com/v1beta/models/' +
        encodeURIComponent(activeModelName(chat)) +
        ':generateContent';
    }

    async function callGemini(chat, signal, allowRetry) {
      ensureOauthConfig();
      if (!appState.accessToken) {
        throw new Error('Inicia sesion con Google para usar Gemini.');
      }

      const response = await fetch(buildGeminiEndpoint(chat), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + appState.accessToken,
          'x-goog-user-project': googleProjectRef()
        },
        body: JSON.stringify(buildRequestBody(chat.messages, chat)),
        signal
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        if (response.status === 401 && allowRetry !== false) {
          await loginWithGoogle({
            interactive: false,
            toast: false,
            skipDriveBootstrap: true
          });
          return callGemini(chat, signal, false);
        }

        const message = data && data.error && data.error.message
          ? data.error.message
          : 'Error HTTP ' + response.status;
        throw new Error(message);
      }

      return {
        text: extractTextFromResponse(data),
        parts: extractModelParts(data)
      };
    }

    function buildUserMessageParts(prompt, attachments) {
      const parts = [];
      if (prompt) {
        parts.push({
          text: prompt
        });
      }
      (attachments || []).forEach((attachment) => {
        if (attachment && attachment.part) {
          parts.push(cloneParts([attachment.part])[0]);
        }
      });
      return parts;
    }

          appState.activeController.abort();

          await loginWithGoogle();
        } catch (error) {
          showToast('OAuth', error.message);
          setComposerStatus('Falta iniciar sesion.');
          return;
        }
      }

      const chat = getActiveChat();
      const parts = buildUserMessageParts(prompt, attachments);
      const fallbackContent = prompt || attachments.map((item) => item.name).join(', ');
      const userMessage = createMessage('user', fallbackContent, false, {
        parts,
        attachments
      });
      const assistantMessage = createMessage('assistant', '', true);

        assistantMessage.content = reply.text;
        assistantMessage.parts = reply.parts;
        touchChat(chat);

        if (error.name === 'AbortError') {
          chat.messages = chat.messages.filter((message) => message.id !== assistantMessage.id);
          setComposerStatus('Solicitud cancelada.');
        } else {
          assistantMessage.pending = false;
          assistantMessage.content = 'Error: ' + error.message;
          assistantMessage.parts = [{ text: assistantMessage.content }];
          touchChat(chat);
          setComposerStatus('Hubo un error.');
          showToast('Error de Gemini', error.message);
        }
      } finally {
        appState.busy = false;
        appState.activeController = null;
        saveState();
        updateSendUi();
        renderHistory();
        renderThread();
      }
    }

      bindEvents();
      setComposerStatus('');
      elements.composer.placeholder = 'Escribe aqui...';

      if (location.protocol === 'file:') {
        elements.composer.placeholder = 'Escribe aqui...';
        showToast('Atencion', 'Sirve este HTML por http://localhost para que Google OAuth funcione correctamente.');
        return;
      }

      window.setTimeout(() => {
        tryAutoRestoreGoogleSession();
      }, 0);
    }

    boot();
  </script>
</body>
</html>
